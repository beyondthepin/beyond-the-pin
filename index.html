<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Beyond the Pin — Content Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#080d17;--bg2:#0d1520;--bgc:#111c2e;--bgh:#162236;--acc:#c9a96e;--accl:#e8c99a;--accd:rgba(201,169,110,0.12);--tp:#f0ece4;--ts:#8a9ab5;--td:#4a5a72;--bdr:rgba(201,169,110,0.15);--bds:rgba(255,255,255,0.07);--grn:#4caf82;--red:#e05c5c;--blu:#5c9de0;--sw:240px;--r:12px;--bnav:64px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#080d17 0%,#0a1020 100%);background-attachment:fixed;color:var(--tp);min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:'Playfair Display',serif}
.shell{display:flex;min-height:100vh}
.main{margin-left:var(--sw);flex:1;padding:40px;max-width:calc(100vw - var(--sw));overflow-y:auto}
.sidebar{width:var(--sw);background:linear-gradient(180deg,#0a1628 0%,#080d17 100%);border-right:1px solid rgba(201,169,110,0.15);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
.slogo{padding:20px 16px;border-bottom:1px solid var(--bds);display:flex;align-items:center;gap:12px}
.lm{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--acc);line-height:1.2}
.lt{font-size:10px;color:var(--td);letter-spacing:.5px;margin-top:2px;text-transform:uppercase}
.snav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nlbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--td);padding:12px 12px 6px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--ts);font-size:13px;font-weight:500;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:var(--bgh);color:var(--tp)}
.ni.active{background:var(--accd);color:var(--acc)}
.nbdg{margin-left:auto;background:var(--acc);color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.sftr{padding:16px;border-top:1px solid var(--bds);font-size:12px;color:var(--ts)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--grn);display:inline-block;margin-right:8px;box-shadow:0 0 6px var(--grn)}
.ph{margin-bottom:32px}
.ph h1{font-size:32px;font-weight:700;line-height:1.1}
.ph p{color:var(--ts);margin-top:6px;font-size:14px}
.card{background:linear-gradient(135deg,rgba(17,28,46,0.8) 0%,rgba(11,18,32,0.9) 100%);border:1px solid rgba(201,169,110,0.1);border-radius:var(--r);padding:24px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.sc{background:linear-gradient(135deg,rgba(17,28,46,0.9) 0%,rgba(11,18,32,0.95) 100%);border:1px solid rgba(201,169,110,0.12);border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--acc),rgba(201,169,110,0.3),transparent)}
.sl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--td);margin-bottom:8px}
.sv{font-family:'Playfair Display',serif;font-size:28px;font-weight:700}
.ss{font-size:12px;color:var(--ts);margin-top:4px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif;text-decoration:none;-webkit-tap-highlight-color:transparent}
.bp{background:var(--acc);color:#000}.bp:hover{background:var(--accl)}
.bs{background:var(--bgh);color:var(--tp);border:1px solid var(--bds)}.bs:hover{border-color:var(--acc);color:var(--acc)}
.bg2b{background:transparent;color:var(--ts);border:1px solid var(--bds)}.bg2b:hover{background:var(--bgh);color:var(--tp)}
.bd{background:rgba(224,92,92,.15);color:var(--red);border:1px solid rgba(224,92,92,.2)}
.bsc{background:rgba(76,175,130,.15);color:var(--grn);border:1px solid rgba(76,175,130,.2)}
.big2{background:rgba(225,48,108,.15);color:#e1306c;border:1px solid rgba(225,48,108,.2)}
.bfb2{background:rgba(66,103,178,.15);color:#7b9fe0;border:1px solid rgba(66,103,178,.2)}
.bsm{padding:6px 14px!important;font-size:12px!important}
.blg{padding:14px 28px;font-size:15px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.inp{width:100%;background:var(--bg);border:1px solid var(--bds);border-radius:8px;padding:12px 14px;color:var(--tp);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--td)}
textarea.inp{resize:vertical;min-height:100px;line-height:1.6}
.lbl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--ts);margin-bottom:6px;display:block}
.fg{margin-bottom:20px}
.pbd{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.byt{background:rgba(255,0,0,.15);color:#ff6b6b}
.big{background:rgba(225,48,108,.15);color:#e1306c}
.btt{background:rgba(255,255,255,.08);color:#e0e0e0}
.bfb{background:rgba(66,103,178,.15);color:#7b9fe0}
.stbd{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.spn{background:rgba(201,169,110,.15);color:var(--acc)}
.sap{background:rgba(76,175,130,.15);color:var(--grn)}
.srj{background:rgba(224,92,92,.15);color:var(--red)}
.spb{background:rgba(92,157,224,.15);color:var(--blu)}
.cc{background:var(--bgc);border:1px solid var(--bds);border-radius:var(--r);padding:24px;margin-bottom:16px}
.cch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px}
.cct{font-family:'Playfair Display',serif;font-size:18px;line-height:1.3}
.ccm{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.csl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--td);margin-bottom:6px}
.cst{font-size:13px;color:var(--ts);line-height:1.6;background:var(--bg);padding:12px;border-radius:8px;border:1px solid var(--bds);white-space:pre-wrap}
.ca{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--bds);flex-wrap:wrap}
.tabs{display:flex;border-bottom:1px solid var(--bds);margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;font-size:13px;font-weight:500;color:var(--ts);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--tp)}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.ring{width:20px;height:20px;border:2px solid var(--bds);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.es{text-align:center;padding:48px 24px;color:var(--ts)}
.ei{font-size:40px;margin-bottom:16px;opacity:.4}
.dvd{height:1px;background:var(--bds);margin:24px 0}
.stl{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:16px}
.pb{height:4px;background:var(--bgh);border-radius:2px;overflow:hidden;margin-top:8px}
.pf{height:100%;background:linear-gradient(90deg,var(--acc),var(--accl));border-radius:2px;transition:width .5s}
.ib{background:var(--accd);border:1px solid var(--bdr);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--accl);line-height:1.6;margin-bottom:20px}
.fi{animation:fadeIn .3s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--td);border-radius:3px}
.mob-header{display:none}
.mob-nav{display:none}
.pub-panel{background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:16px;margin-top:16px}
.pub-panel-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--acc);margin-bottom:12px}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.img-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.img-thumb.selected{border-color:var(--acc);box-shadow:0 0 0 2px var(--accd)}
.pub-status{font-size:12px;padding:8px 12px;border-radius:6px;margin-top:8px}
.pub-ok{background:rgba(76,175,130,.15);color:var(--grn);border:1px solid rgba(76,175,130,.2)}
.pub-err{background:rgba(224,92,92,.1);color:var(--red);border:1px solid rgba(224,92,92,.2)}
.banner-wrap{border-radius:var(--r);overflow:hidden;margin-bottom:28px;position:relative;height:200px;background:linear-gradient(135deg,#0a1628 0%,#162236 100%)}
.banner-wrap img{width:100%;height:100%;object-fit:cover;object-position:center center;display:block}
.banner-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,13,23,0) 40%,rgba(8,13,23,0.65) 100%)}
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0;padding:16px;padding-bottom:calc(var(--bnav) + 16px);max-width:100%}
  .g2{grid-template-columns:1fr}
  .sg{grid-template-columns:1fr 1fr}
  .ph h1{font-size:24px}
  .mob-header{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--bg2);border-bottom:1px solid var(--bds);margin:-16px -16px 24px -16px;position:sticky;top:0;z-index:50}
  .mob-header .lm{font-size:16px}
  .mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bds);z-index:100;height:var(--bnav);padding-bottom:env(safe-area-inset-bottom)}
  .mob-ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--ts);font-size:9px;font-family:'DM Sans',sans-serif;font-weight:500;padding:8px 4px;-webkit-tap-highlight-color:transparent;position:relative}
  .mob-ni.active{color:var(--acc)}
  .mob-ni-icon{font-size:18px;line-height:1}
  .mob-ni-bdg{position:absolute;top:6px;right:calc(50% - 14px);background:var(--acc);color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}
  .ca{flex-direction:column}
  .ca .btn{width:100%;justify-content:center}
  .bsm{padding:10px 14px!important;font-size:13px!important}
  .card{padding:16px}
  .cc{padding:16px}
  .img-grid{grid-template-columns:repeat(2,1fr)}
  .banner-wrap{height:140px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

// ── LOGO (small inline svg globe+pin) ─────────────────────────────────────────
const LOGO_SVG = `data:image/svg+xml;charset=utf-8,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80"><circle cx="40" cy="40" r="40" fill="#0d1520"/><circle cx="40" cy="36" r="22" fill="none" stroke="#c9a96e" stroke-width="2.5"/><path d="M40 14 C32 14 28 24 28 36 C28 48 32 58 40 58 C48 58 52 48 52 36 C52 24 48 14 40 14Z" fill="none" stroke="#c9a96e" stroke-width="1.5"/><line x1="18" y1="36" x2="62" y2="36" stroke="#c9a96e" stroke-width="1.5"/><line x1="40" y1="14" x2="40" y2="58" stroke="#c9a96e" stroke-width="1.5"/><path d="M40 52 L35 62 L40 60 L45 62 Z" fill="#c9a96e"/><circle cx="40" cy="52" r="4" fill="#c9a96e"/></svg>')}`;

function App() {
  const [page, setPage] = useState('dashboard');
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('btp_api') || '');
  const [elevenKey, setElevenKey] = useState(() => localStorage.getItem('btp_eleven') || '');
  const [pexelsKey, setPexelsKey] = useState(() => localStorage.getItem('btp_pexels') || '');
  const [queue, setQueue] = useState(() => { try { return JSON.parse(localStorage.getItem('btp_q') || '[]'); } catch { return []; } });
  const [published, setPublished] = useState(() => { try { return JSON.parse(localStorage.getItem('btp_pub') || '[]'); } catch { return []; } });
  const [affiliates, setAffiliates] = useState(() => { try { return JSON.parse(localStorage.getItem('btp_aff') || '{}'); } catch { return {}; } });
  const [platforms, setPlatforms] = useState(() => { try { return JSON.parse(localStorage.getItem('btp_plt') || '{}'); } catch { return {}; } });
  const [postHistory, setPostHistory] = useState(() => { try { return JSON.parse(localStorage.getItem('btp_history') || '[]'); } catch { return []; } });
  const [guides, setGuides] = useState(() => { try { return JSON.parse(localStorage.getItem('btp_guides') || '[]'); } catch { return []; } });
  const [bannerUrl, setBannerUrl] = useState(() => localStorage.getItem('btp_banner') || '');

  useEffect(() => { localStorage.setItem('btp_api', apiKey); }, [apiKey]);
  useEffect(() => { localStorage.setItem('btp_eleven', elevenKey); }, [elevenKey]);
  useEffect(() => { localStorage.setItem('btp_pexels', pexelsKey); }, [pexelsKey]);
  useEffect(() => { localStorage.setItem('btp_q', JSON.stringify(queue)); }, [queue]);
  useEffect(() => { localStorage.setItem('btp_pub', JSON.stringify(published)); }, [published]);
  useEffect(() => { localStorage.setItem('btp_aff', JSON.stringify(affiliates)); }, [affiliates]);
  useEffect(() => { localStorage.setItem('btp_plt', JSON.stringify(platforms)); }, [platforms]);
  useEffect(() => { localStorage.setItem('btp_history', JSON.stringify(postHistory)); }, [postHistory]);
  useEffect(() => { localStorage.setItem('btp_guides', JSON.stringify(guides)); }, [guides]);
  useEffect(() => { localStorage.setItem('btp_banner', bannerUrl); }, [bannerUrl]);

  const addToHistory = (itemId, platform, title, destination) => {
    setPostHistory(h => [{id: Date.now(), itemId, platform, title, destination, postedAt: new Date().toISOString()}, ...h].slice(0, 50));
  };
  const approve = (id) => {
    const item = queue.find(q => q.id === id);
    if (item) { setPublished(p => [...p, {...item, status:'approved', approvedAt: new Date().toISOString()}]); setQueue(q => q.filter(i => i.id !== id)); }
  };
  const reject = (id) => setQueue(q => q.map(i => i.id === id ? {...i, status:'rejected'} : i));
  const editItem = (id, u) => setQueue(q => q.map(i => i.id === id ? {...i, ...u} : i));
  const addToQueue = (item) => setQueue(q => [...q, {...item, id: Date.now() + Math.random(), status:'pending', createdAt: new Date().toISOString()}]);
  const addGuide = (g) => setGuides(gs => [{...g, id: Date.now() + Math.random(), createdAt: new Date().toISOString()}, ...gs]);
  const deleteGuide = (id) => setGuides(gs => gs.filter(g => g.id !== id));

  const pending = queue.filter(q => q.status === 'pending').length;

  const nav = [
    {id:'dashboard', icon:'◈', label:'Dashboard'},
    {id:'generate', icon:'✦', label:'Generate Content'},
    {id:'queue', icon:'◎', label:'Approval Queue', badge:pending},
    {id:'calendar', icon:'▦', label:'Content Calendar'},
    {id:'monetization', icon:'◆', label:'Monetization'},
    {id:'analytics', icon:'📊', label:'Analytics'},
    {id:'guides', icon:'📖', label:'Digital Products'},
    {id:'video', icon:'▶', label:'Video Studio'},
    {id:'settings', icon:'◉', label:'Settings'},
  ];
  const mobNav = [
    {id:'dashboard', icon:'◈', label:'Home'},
    {id:'generate', icon:'✦', label:'Create'},
    {id:'queue', icon:'◎', label:'Queue', badge:pending},
    {id:'analytics', icon:'📊', label:'Analytics'},
    {id:'monetization', icon:'◆', label:'Money'},
    {id:'settings', icon:'◉', label:'More'},
  ];

  const pages = {dashboard:Dashboard, generate:Generate, queue:QueuePage, calendar:CalendarPage, monetization:Monetization, analytics:AnalyticsPage, guides:GuidesPage, video:VideoStudio, settings:SettingsPage};
  const Page = pages[page] || Dashboard;

  const sharedProps = {queue, published, affiliates, setAffiliates, platforms, setPlatforms, apiKey, setApiKey, elevenKey, setElevenKey, pexelsKey, setPexelsKey, approve, reject, editItem, addToQueue, setPage, postHistory, addToHistory, guides, addGuide, deleteGuide, bannerUrl, setBannerUrl};

  return (
    <div className="shell">
      <aside className="sidebar">
        <div className="slogo">
          <img src={LOGO_SVG} alt="BTP" style={{width:40,height:40,borderRadius:'50%',flexShrink:0}}/>
          <div><div className="lm">Beyond the Pin</div><div className="lt">Command Center</div></div>
        </div>
        <nav className="snav">
          <div className="nlbl">Navigation</div>
          {nav.map(n => (
            <button key={n.id} className={`ni ${page===n.id?'active':''}`} onClick={() => setPage(n.id)}>
              <span style={{fontSize:15,width:20,textAlign:'center'}}>{n.icon}</span>
              {n.label}
              {n.badge > 0 && <span className="nbdg">{n.badge}</span>}
            </button>
          ))}
        </nav>
        <div className="sftr"><span className="sdot"/>Agent Active</div>
      </aside>
      <main className="main">
        <div className="mob-header">
          <img src={LOGO_SVG} alt="BTP" style={{height:32,width:'auto'}}/>
          <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--ts)'}}><span className="sdot"/><span>Live</span></div>
        </div>
        <Page {...sharedProps}/>
      </main>
      <nav className="mob-nav">
        {mobNav.map(n => (
          <button key={n.id} className={`mob-ni ${page===n.id?'active':''}`} onClick={() => setPage(n.id)}>
            {n.badge > 0 && <span className="mob-ni-bdg">{n.badge}</span>}
            <span className="mob-ni-icon">{n.icon}</span>
            <span>{n.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

function Plats() {
  return (
    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
      <span className="pbd byt">▶ YouTube</span>
      <span className="pbd big">◎ Instagram</span>
      <span className="pbd btt">♪ TikTok</span>
      <span className="pbd bfb">⬡ Facebook</span>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({queue, published, setPage, platforms, postHistory, bannerUrl}) {
  const pending = queue.filter(q => q.status === 'pending').length;
  const recent = [...queue, ...published].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0,5);
  const checkTokenAge = () => { const s = localStorage.getItem('btp_token_time'); if(!s) return false; return (Date.now()-parseInt(s))/(1000*60*60) > 1; };
  const tokenWarning = platforms && (platforms.ig_access_token || platforms.fb_access_token) && checkTokenAge();

  return (
    <div className="fi">
      <div className="banner-wrap" style={{boxShadow:'0 8px 32px rgba(0,0,0,0.4)'}}>
        {bannerUrl
          ? <img src={bannerUrl} alt="Beyond the Pin"/>
          : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8}}>
              <div style={{fontFamily:'Playfair Display,serif',fontSize:22,color:'var(--acc)',fontWeight:700}}>Beyond the Pin</div>
              <div style={{fontSize:12,color:'var(--ts)'}}>Upload your banner in Settings</div>
            </div>
        }
        <div className="banner-overlay"/>
      </div>
      <div style={{marginBottom:24,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <h1 style={{fontSize:24,fontWeight:700,fontFamily:'Playfair Display,serif'}}>Command Center</h1>
          <p style={{color:'var(--ts)',fontSize:13,marginTop:4}}>Your Beyond the Pin operation at a glance.</p>
        </div>
        <div style={{fontSize:11,color:'var(--td)',textAlign:'right'}}>{new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
      </div>
      <div className="sg">
        <div className="sc"><div className="sl">Awaiting Approval</div><div className="sv" style={{color:pending>0?'var(--acc)':'var(--tp)'}}>{pending}</div><div className="ss">pieces need review</div>{pending>0&&<button className="btn bp bsm" style={{marginTop:12}} onClick={()=>setPage('queue')}>Review Now →</button>}</div>
        <div className="sc"><div className="sl">Published</div><div className="sv">{published.length}</div><div className="ss">pieces approved</div></div>
        <div className="sc"><div className="sl">Total Content</div><div className="sv">{queue.length+published.length}</div><div className="ss">pieces generated</div></div>
        <div className="sc"><div className="sl">Active Platforms</div><div className="sv">4</div><div className="ss">YT · IG · TikTok · FB</div></div>
      </div>
      <div className="g2" style={{gap:20,marginBottom:24}}>
        <div className="card">
          <div className="stl" style={{fontSize:16,marginBottom:16}}>Quick Actions</div>

            <button className="btn bs" onClick={()=>setPage('queue')}>◎ Approval Queue {pending>0&&`(${pending})`}</button>
            <button className="btn bs" onClick={()=>setPage('guides')}>📖 Digital Products</button>
            <button className="btn bs" onClick={()=>setPage('calendar')}>▦ Content Calendar</button>

          <div className="stl" style={{fontSize:16,marginBottom:16}}>Platform Status</div>

            {name:'YouTube', connected:!!(platforms.yt_client_id&&platforms.yt_refresh_token)},

              {p.connected?<span className="stbd sap">✓ Connected</span>:<button className="btn bg2b bsm" onClick={()=>setPage('settings')}>Connect</button>}
            </div>
          ))}

      {tokenWarning&&(
        <div style={{background:'rgba(224,92,92,.1)',border:'1px solid rgba(224,92,92,.2)',borderRadius:8,padding:'12px 16px',marginBottom:20,fontSize:13,color:'var(--red)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>⚠ Your Meta access tokens may be expiring soon. Refresh in Graph API Explorer.</span>
          <button className="btn bg2b bsm" onClick={()=>setPage('settings')}>Settings →</button>
        </div>
      )}
      <div className="card" style={{marginBottom:24}}>

              <span className={`stbd ${h.platform==='both'?'sap':h.platform==='instagram'?'big':'spb'}`} style={{fontSize:10}}>{h.platform==='both'?'◎⬡ Both':h.platform==='instagram'?'◎ IG':'⬡ FB'}</span>
            </div>

      <div className="card">
        <div className="stl" style={{fontSize:16,marginBottom:16}}>Recent Content</div>
        {recent.length===0
          ? <div className="es"><div className="ei">✦</div><h3>No content yet</h3><p>Generate your first piece to get started.</p><button className="btn bp" style={{marginTop:16}} onClick={()=>setPage('generate')}>Generate Content</button></div>
          : recent.map(item => (
            <div key={item.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderBottom:'1px solid var(--bds)'}}>

              <span className={`stbd ${item.status==='pending'?'spn':item.status==='approved'?'sap':'srj'}`}>{item.status}</span>

}

// ── GENERATE ──────────────────────────────────────────────────────────────────
const CTYPES = [
  {id:'hidden_gems', label:'Hidden Gems', desc:'Lesser-known spots and secret experiences'},
  {id:'tourist_vs_local', label:'Tourist vs Local', desc:'What boards show vs what locals actually do'},
  {id:'itinerary', label:'Full Itinerary', desc:'Day-by-day experience-focused breakdown'},
  {id:'budget_guide', label:'Budget Guide', desc:'Best experiences for less'},
  {id:'luxury_guide', label:'Luxury Guide', desc:'Curated premium experiences'},
  {id:'seasonal', label:'Best Time to Visit', desc:'Seasonal breakdown with insider activity tips'},
];

function Generate({apiKey, addToQueue, affiliates, setPage}) {
  const [dest, setDest] = useState('');
  const [ctype, setCtype] = useState('hidden_gems');
  const [generating, setGenerating] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [weekMode, setWeekMode] = useState(false);
  const [weekResults, setWeekResults] = useState([]);
  const [weekGen, setWeekGen] = useState(false);
  const [weekPct, setWeekPct] = useState(0);
  const [activeTab, setActiveTab] = useState('script');

  const affLinks = () => {
    const l = [];
    if (affiliates.getyourguide) l.push(`Book local experiences & tours: ${affiliates.getyourguide}`);
    if (affiliates.viator) l.push(`Find guided tours & activities: ${affiliates.viator}`);
    if (affiliates.airbnb) l.push(`Unique local experiences: ${affiliates.airbnb}`);
    if (affiliates.tripadvisor) l.push(`Explore things to do: ${affiliates.tripadvisor}`);
    if (affiliates.amazon) l.push(`Travel essentials & gear: ${affiliates.amazon}`);
    if (l.length === 0) l.push('Book local experiences: [ADD YOUR GETYOURGUIDE LINK]\nFind guided tours: [ADD YOUR VIATOR LINK]');
    return l.join('\n');
  };

  const genContent = async (d, t) => {
    if (!apiKey) throw new Error('NO_KEY');
    const ct = CTYPES.find(c => c.id === t);
    const prompt = `You are the AI content engine for "Beyond the Pin" — a faceless travel YouTube channel.
Brand: Beyond the Pin | Tagline: "Beyond every board or pin lives an experience."
Voice: Cinematic, curious, experiential. Goes deeper than Pinterest boards. Reveals what curated content misses.
Core focus: BOOKABLE EXPERIENCES — hidden tours, local cooking classes, secret viewpoints with guided access, off-the-beaten-path activities. The audience wants to DO things, not just see them on a board.
Rotating taglines to use: "Unpin the ordinary." / "Drop the pin. Then go further." / "The world doesn't fit in a board." / "Stop scrolling. Start going." / "What the board can't capture." / "You saved it. Now live it."

Generate for: [${d}] | Type: ${ct?.label} — ${ct?.desc}

IMPORTANT CONTENT RULES:
- Every CTA must reference bookable EXPERIENCES (tours, activities, classes, guided walks, tastings) — never hotels or accommodation
- Naturally weave in experience affiliate links as CTAs (e.g. "book this exact tour on GetYourGuide", "we found this cooking class on Viator", "this experience is still available — link in bio")
- Make the viewer feel they can BOOK this experience RIGHT NOW

Respond ONLY with valid JSON, no markdown, no extra text:
{"title":"Video title max 60 chars","hook":"Opening 2-3 sentences that grab immediately","youtube_script":"Full narration 600-900 words with hook, 3-5 experience-focused sections, affiliate experience CTAs woven in naturally, closing tagline","youtube_description":"Full YT description 300 words with overview, timestamps placeholder, experience affiliate links, subscribe CTA, hashtags","youtube_tags":["tag1","tag2","tag3","tag4","tag5","tag6","tag7","tag8","tag9","tag10"],"instagram_caption":"Instagram Reels caption max 150 words, hook first line, storytelling about the experience, CTA to book it, 15 hashtags","tiktok_caption":"TikTok caption max 100 words, punchy, 3-5 hashtags, strong experience CTA","facebook_caption":"Facebook caption max 200 words, conversational, question for comments, naturally include experience affiliate link as CTA, 5 hashtags","tagline_used":"The rotating tagline used","pinned_comment":"Pinned comment with experience affiliate links","comment_reply_templates":["Reply 1","Reply 2","Reply 3"],"b_roll_suggestions":["Shot 1","Shot 2","Shot 3","Shot 4","Shot 5"],"thumbnail_concept":"Thumbnail visual description"}

Experience affiliate links to embed naturally:
${affLinks()}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3000,messages:[{role:'user',content:prompt}]})
    });
    const rawText = await res.text();
    let data; try { data = JSON.parse(rawText); } catch(e) { throw new Error('Invalid server response'); }
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    if (!data.content?.length) throw new Error('No content returned');
    const text = data.content.map(i => i.text||'').join('');
    let parsed;
    try { parsed = JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch(e) { const m = text.match(/\{[\s\S]*\}/); if(m) { try { parsed=JSON.parse(m[0]); } catch(e2) { throw new Error('Could not parse AI response'); } } else throw new Error('Could not parse AI response'); }
    return {...parsed, destination:d, contentType:t};
  };

  const handleGen = async () => {
    if (!dest.trim()) { setError('Enter a destination.'); return; }
    if (!apiKey) { setError('Add your Claude API key in Settings first.'); return; }
    setError(''); setGenerating(true); setResult(null);
    try { setResult(await genContent(dest, ctype)); }
    catch(e) { setError(e.message==='NO_KEY'?'Add your Claude API key in Settings first.':'Error: '+e.message); }
    setGenerating(false);
  };

  const handleWeek = async () => {
    if (!apiKey) { setError('Add your Claude API key in Settings first.'); return; }
    const dests = [{d:'Santorini, Greece',t:'hidden_gems'},{d:'Kyoto, Japan',t:'tourist_vs_local'},{d:'Lisbon, Portugal',t:'budget_guide'},{d:'Amalfi Coast, Italy',t:'luxury_guide'},{d:'Marrakech, Morocco',t:'itinerary'},{d:'Bali, Indonesia',t:'seasonal'},{d:'Iceland',t:'hidden_gems'}];
    setWeekGen(true); setWeekResults([]); setWeekPct(0);
    const results = [];
    for (let i = 0; i < dests.length; i++) {
      try { const r = await genContent(dests[i].d, dests[i].t); if(r) results.push(r); } catch(e) { console.error(e); }
      setWeekPct(Math.round(((i+1)/dests.length)*100));
    }
    setWeekResults(results); setWeekGen(false);
  };

  const toQueue = (r) => addToQueue({title:r.title,destination:r.destination,contentType:r.contentType,hook:r.hook,youtube_script:r.youtube_script,youtube_description:r.youtube_description,youtube_tags:r.youtube_tags,instagram_caption:r.instagram_caption,tiktok_caption:r.tiktok_caption,facebook_caption:r.facebook_caption,tagline_used:r.tagline_used,pinned_comment:r.pinned_comment,comment_reply_templates:r.comment_reply_templates,b_roll_suggestions:r.b_roll_suggestions,thumbnail_concept:r.thumbnail_concept});

  const tabs = [{id:'script',l:'YT Script'},{id:'desc',l:'YT Description'},{id:'ig',l:'Instagram'},{id:'tt',l:'TikTok'},{id:'fb',l:'Facebook'},{id:'broll',l:'B-Roll'},{id:'eng',l:'Engagement'}];

  return (
    <div className="fi">
      <div className="ph"><h1>Generate Content</h1><p>AI-powered experience-focused content for all platforms. You approve before anything goes live.</p></div>
      {!apiKey&&<div className="ib">⚠ <strong>API Key Required:</strong> Go to Settings first. <button className="btn bg2b bsm" style={{marginLeft:8}} onClick={()=>setPage('settings')}>Settings →</button></div>}
      {error&&<div style={{background:'rgba(224,92,92,.1)',border:'1px solid rgba(224,92,92,.2)',borderRadius:8,padding:'12px 16px',marginBottom:20,fontSize:14,color:'var(--red)'}}>{error}</div>}
      <div className="tabs">
        <button className={`tab ${!weekMode?'active':''}`} onClick={()=>setWeekMode(false)}>Single Piece</button>
        <button className={`tab ${weekMode?'active':''}`} onClick={()=>setWeekMode(true)}>Weekly Calendar (7 pieces)</button>
      </div>
      {!weekMode ? (
        <>
          <div className="card" style={{marginBottom:24}}>
            <div className="g2" style={{gap:20}}>
              <div className="fg" style={{marginBottom:0}}><label className="lbl">Destination</label><input className="inp" placeholder="e.g. Santorini, Greece" value={dest} onChange={e=>setDest(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleGen()}/></div>
              <div className="fg" style={{marginBottom:0}}><label className="lbl">Content Type</label><select className="inp" value={ctype} onChange={e=>setCtype(e.target.value)}>{CTYPES.map(t=><option key={t.id} value={t.id}>{t.label} — {t.desc}</option>)}</select></div>
            </div>
            <div style={{marginTop:20}}><button className="btn bp blg" onClick={handleGen} disabled={generating||!dest}>{generating?<><span className="ring"/> Generating...</>:'✦ Generate All Platform Content'}</button></div>
          </div>
          {generating&&<div className="card" style={{display:'flex',flexDirection:'column',alignItems:'center',padding:48,gap:16,color:'var(--ts)'}}><span className="ring" style={{width:32,height:32,borderWidth:3}}/><p>Writing scripts, captions, hashtags & experience CTAs for all 4 platforms...</p><p style={{fontSize:12,color:'var(--td)'}}>~15-20 seconds</p></div>}
          {result&&!generating&&(
            <div className="cc fi">
              <div className="cch">
                <div><div className="cct">{result.title}</div><div className="ccm"><Plats/></div>{result.tagline_used&&<div style={{fontSize:12,color:'var(--acc)',marginTop:8,fontStyle:'italic'}}>"{result.tagline_used}"</div>}</div>
                <span className="stbd spn">Ready for Review</span>
              </div>
              <div style={{marginBottom:14}}><div className="csl">Hook</div><div className="cst">{result.hook}</div></div>
              <div className="tabs" style={{marginBottom:16}}>{tabs.map(t=><button key={t.id} className={`tab ${activeTab===t.id?'active':''}`} onClick={()=>setActiveTab(t.id)}>{t.l}</button>)}</div>
              {activeTab==='script'&&<div className="cst" style={{maxHeight:350,overflowY:'auto'}}>{result.youtube_script}</div>}
              {activeTab==='desc'&&<div className="cst" style={{maxHeight:350,overflowY:'auto'}}>{result.youtube_description}{result.youtube_tags&&<div style={{marginTop:16,paddingTop:16,borderTop:'1px solid var(--bds)'}}><div className="csl">TAGS</div><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{result.youtube_tags.map((t,i)=><span key={i} style={{background:'var(--bgh)',padding:'2px 8px',borderRadius:4,fontSize:12,color:'var(--ts)'}}>{t}</span>)}</div></div>}</div>}
              {activeTab==='ig'&&<div className="cst">{result.instagram_caption}</div>}
              {activeTab==='tt'&&<div className="cst">{result.tiktok_caption}</div>}
              {activeTab==='fb'&&<div className="cst">{result.facebook_caption}</div>}
              {activeTab==='broll'&&<div><div style={{marginBottom:14}}><div className="csl">B-Roll Shot List</div><div className="cst">{result.b_roll_suggestions?.map((s,i)=>`${i+1}. ${s}`).join('\n')}</div></div><div><div className="csl">Thumbnail Concept</div><div className="cst">{result.thumbnail_concept}</div></div></div>}
              {activeTab==='eng'&&<div><div style={{marginBottom:14}}><div className="csl">Pinned Comment</div><div className="cst">{result.pinned_comment}</div></div><div><div className="csl">Reply Templates</div><div className="cst">{result.comment_reply_templates?.map((t,i)=>`Reply ${i+1}:\n${t}`).join('\n\n')}</div></div></div>}
              <div className="ca">
                <button className="btn bp" onClick={()=>{toQueue(result);setResult(null);setDest('');setPage('queue');}}>✓ Send to Approval Queue</button>
                <button className="btn bg2b" onClick={handleGen}>↻ Regenerate</button>
              </div>
            </div>
          )}
        </>
      ) : (
        <>
          <div className="card" style={{marginBottom:24}}>
            <div className="stl" style={{fontSize:16,marginBottom:8}}>Weekly Content Calendar</div>
            <p style={{fontSize:14,color:'var(--ts)',marginBottom:20}}>Generates 7 experience-focused pieces across trending destinations — one per day.</p>
            <button className="btn bp blg" onClick={handleWeek} disabled={weekGen}>{weekGen?<><span className="ring"/> Generating week...</>:'✦ Generate Full Week'}</button>
            {weekGen&&<div style={{marginTop:20}}><div style={{fontSize:13,color:'var(--ts)',marginBottom:8}}>Generating... {weekPct}% complete</div><div className="pb"><div className="pf" style={{width:`${weekPct}%`}}/></div></div>}
          </div>
          {weekResults.length>0&&(
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <div className="stl">{weekResults.length} Pieces Ready</div>
                <button className="btn bp" onClick={()=>{weekResults.forEach(r=>toQueue(r));setWeekResults([]);setPage('queue');}}>Send All to Queue →</button>
              </div>
              {weekResults.map((r,i)=>(
                <div key={i} className="cc">
                  <div className="cch"><div><div className="cct">{r.title}</div><div className="ccm"><Plats/></div></div><button className="btn bsc bsm" onClick={()=>{toQueue(r);setWeekResults(weekResults.filter((_,j)=>j!==i));}}>Add to Queue</button></div>
                  <div style={{fontSize:13,color:'var(--ts)'}}>{r.hook}</div>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ── PUBLISH PANEL ─────────────────────────────────────────────────────────────
function PublishPanel({item, platforms, pexelsKey, onPostSuccess}) {
  const [images, setImages] = useState([]);
  const [loadingImgs, setLoadingImgs] = useState(false);
  const [selectedImg, setSelectedImg] = useState(null);
  const [igStatus, setIgStatus] = useState('');
  const [fbStatus, setFbStatus] = useState('');
  const [igPosting, setIgPosting] = useState(false);
  const [fbPosting, setFbPosting] = useState(false);
  const [bothPosting, setBothPosting] = useState(false);
  const [imgError, setImgError] = useState('');
  const [editingIg, setEditingIg] = useState(false);
  const [editingFb, setEditingFb] = useState(false);
  const [igCaption, setIgCaption] = useState(item.instagram_caption || item.hook || '');
  const [fbCaption, setFbCaption] = useState(item.facebook_caption || item.hook || '');

  const igReady = !!(platforms.ig_access_token && platforms.ig_user_id);
  const fbReady = !!(platforms.fb_access_token && platforms.fb_page_id);

  const searchImages = async () => {
    if (!pexelsKey) { setImgError('Add Pexels API key in Settings.'); return; }
    setLoadingImgs(true); setImgError(''); setImages([]);
    try {
      const res = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(item.destination||'travel')}&per_page=9&orientation=landscape`, {headers:{Authorization:pexelsKey}});
      const data = await res.json();
      setImages(data.photos || []);
    } catch(e) { setImgError('Could not load images: '+e.message); }
    setLoadingImgs(false);
  };

  const postToInstagram = async () => {
    if (!selectedImg) { setIgStatus('error:Pick an image first.'); return; }
    if (!igReady) { setIgStatus('error:Add Instagram credentials in Settings.'); return; }
    setIgPosting(true); setIgStatus('posting');
    try {
      const cr = await fetch(`https://graph.facebook.com/v18.0/${platforms.ig_user_id}/media`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_url:selectedImg.src.large,caption:igCaption,access_token:platforms.ig_access_token})});
      const cd = await cr.json(); if(cd.error) throw new Error(cd.error.message);
      await new Promise(r=>setTimeout(r,2000));
      const pr = await fetch(`https://graph.facebook.com/v18.0/${platforms.ig_user_id}/media_publish`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({creation_id:cd.id,access_token:platforms.ig_access_token})});
      const pd = await pr.json(); if(pd.error) throw new Error(pd.error.message);
      setIgStatus('ok:Posted to Instagram! ID: '+pd.id);
    } catch(e) { setIgStatus('error:'+e.message); }
    setIgPosting(false);
  };

  const postToFacebook = async () => {
    if (!selectedImg) { setFbStatus('error:Pick an image first.'); return; }
    if (!fbReady) { setFbStatus('error:Add Facebook credentials in Settings.'); return; }
    setFbPosting(true); setFbStatus('posting');
    try {
      const ur = await fetch(`https://graph.facebook.com/v18.0/${platforms.fb_page_id}/photos`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:selectedImg.src.large,published:false,access_token:platforms.fb_access_token})});
      const ud = await ur.json(); if(ud.error) throw new Error(ud.error.message);
      const fr = await fetch(`https://graph.facebook.com/v18.0/${platforms.fb_page_id}/feed`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:fbCaption,attached_media:[{media_fbid:ud.id}],access_token:platforms.fb_access_token})});
      const fd = await fr.json(); if(fd.error) throw new Error(fd.error.message);
      if (item.pinned_comment) {
        try {
          await fetch(`https://graph.facebook.com/v18.0/${fd.id}/comments`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:item.pinned_comment,access_token:platforms.fb_access_token})});
        } catch(e) {}
      }
      setFbStatus('ok:Posted to Facebook! ID: '+fd.id);
    } catch(e) { setFbStatus('error:'+e.message); }
    setFbPosting(false);
  };

  const statusEl = (s, posting) => {
    if (posting) return <div className="pub-status" style={{background:'var(--accd)',color:'var(--acc)',border:'1px solid var(--bdr)'}}><span className="ring" style={{width:14,height:14,borderWidth:2,marginRight:8}}/>Posting...</div>;
    if (!s||s==='posting') return null;
    const [type, ...rest] = s.split(':'); const msg = rest.join(':');
    return <div className={`pub-status ${type==='ok'?'pub-ok':'pub-err'}`}>{type==='ok'?'✓ ':'✕ '}{msg}</div>;
  };

  return (
    <div className="pub-panel">
      <div className="pub-panel-title">◎ Publish to Social</div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12,color:'var(--ts)',marginBottom:8}}>1. Pick a photo</div>
        <button className="btn bs bsm" onClick={searchImages} disabled={loadingImgs||!pexelsKey}>{loadingImgs?<><span className="ring" style={{width:14,height:14,borderWidth:2}}/>Loading...</>:'🔍 Search Travel Photos'}</button>
        {!pexelsKey&&<div style={{fontSize:11,color:'var(--td)',marginTop:4}}>Add Pexels key in Settings.</div>}
        {imgError&&<div style={{fontSize:12,color:'var(--red)',marginTop:6}}>{imgError}</div>}
        {images.length>0&&<div className="img-grid">{images.map(img=><img key={img.id} src={img.src.medium} alt={img.alt} className={`img-thumb ${selectedImg?.id===img.id?'selected':''}`} onClick={()=>setSelectedImg(img)}/>)}</div>}
        {selectedImg&&<div style={{fontSize:11,color:'var(--grn)',marginTop:4}}>✓ Selected — {selectedImg.photographer}</div>}
      </div>
      {['ig','fb'].map(p=>{
        const editing = p==='ig'?editingIg:editingFb;
        const setEditing = p==='ig'?setEditingIg:setEditingFb;
        const caption = p==='ig'?igCaption:fbCaption;
        const setCaption = p==='ig'?setIgCaption:setFbCaption;
        const label = p==='ig'?'Instagram caption':'Facebook caption';
        return (
          <div key={p} style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <div style={{fontSize:12,color:'var(--ts)'}}>{label}</div>

const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function CalendarPage({published, queue}) {
  const [cur, setCur] = useState(new Date());
  const [sel, setSel] = useState(null);

  const getDay=(d)=>{const s=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;return all.filter(c=>{const dt=c.approvedAt||c.createdAt;return dt&&dt.startsWith(s);});};
  const cells=[]; for(let i=0;i<firstDay;i++)cells.push(null); for(let d=1;d<=dim;d++)cells.push(d);
  const today=new Date(); const selContent=sel?getDay(sel):[];

  return (
    <div className="fi">
      <div className="ph"><h1>Content Calendar</h1><p>Your approved content schedule.</p></div>
      <div className="g2" style={{gap:24,alignItems:'start'}}>

            <button className="btn bg2b bsm" onClick={()=>setCur(new Date(yr,mo+1,1))}>Next →</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:8}}>{DAYS.map(d=><div key={d} style={{textAlign:'center',fontSize:11,color:'var(--td)',padding:'4px 0',textTransform:'uppercase'}}>{d}</div>)}</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
            {cells.map((day,i)=>{
              if(!day)return<div key={i}/>;
              const dc=getDay(day);
              const isToday=today.getDate()===day&&today.getMonth()===mo&&today.getFullYear()===yr;
              const isSel=sel===day;
              return(<div key={i} onClick={()=>setSel(isSel?null:day)} style={{padding:'8px 4px',borderRadius:8,textAlign:'center',cursor:'pointer',background:isSel?'var(--accd)':isToday?'var(--bgh)':'transparent',border:isSel?'1px solid var(--acc)':isToday?'1px solid var(--bdr)':'1px solid transparent',minHeight:52}}>

                {dc.length>0&&<div style={{display:'flex',justifyContent:'center',gap:2}}>{dc.slice(0,3).map((_,ci)=><div key={ci} style={{width:6,height:6,borderRadius:'50%',background:'var(--acc)'}}/>)}</div>}
              </div>);
            })}

        </div>
        <div className="card">
          {sel?(<><div className="stl" style={{fontSize:16,marginBottom:16}}>{MONTHS[mo]} {sel}, {yr}</div>{selContent.length===0?<div className="es" style={{padding:'32px 0'}}><div className="ei">◎</div><h3>No content</h3></div>:selContent.map(item=>(<div key={item.id} style={{padding:'12px 0',borderBottom:'1px solid var(--bds)'}}><div style={{fontSize:14,fontWeight:600,marginBottom:6}}>{item.title}</div><div style={{fontSize:12,color:'var(--ts)',marginBottom:8}}>{item.destination}</div><Plats/></div>))}</>):<div className="es" style={{padding:'40px 0'}}><div className="ei">▦</div><h3>Select a day</h3><p>Click any date to see content.</p></div>}

  );

Write 5-7 sections covering the destination from an experience-first perspective.`;

      const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:prompt}]})});
      const rawText = await res.text();
      const data = JSON.parse(rawText);
      if (data.error) throw new Error(data.error.message||JSON.stringify(data.error));
      const text = data.content.map(i=>i.text||'').join('');
      let parsed;
      try { parsed = JSON.parse(text.replace(/```json|```/g,'').trim()); }
      catch(e) { const m=text.match(/\{[\s\S]*\}/); if(m){try{parsed=JSON.parse(m[0]);}catch(e2){throw new Error('Could not parse guide content');}}else throw new Error('Could not parse guide content'); }
      setPreview({...parsed, destination:dest, guideType});
    } catch(e) { setError('Error: '+e.message); }
    setGenerating(false);
  };

  const saveGuide = () => { if(!preview) return; addGuide(preview); setPreview(null); setDest(''); };

  const exportGuide = (guide) => {
    let text = `${guide.title}\n${guide.subtitle||''}\n\nA Beyond the Pin Digital Guide\n${'─'.repeat(50)}\n\nINTRODUCTION\n\n${guide.intro}\n\n`;
    (guide.sections||[]).forEach(s => {
      text += `${'─'.repeat(50)}\n${s.heading.toUpperCase()}\n\n${s.content}\n\n`;
      if(s.experiences?.length>0) text += `BOOKABLE EXPERIENCES:\n${s.experiences.map(e=>`• ${e}`).join('\n')}\n\n`;
    });
    if(guide.quick_tips) text += `${'─'.repeat(50)}\nQUICK TIPS\n\n${guide.quick_tips.map(t=>`• ${t}`).join('\n')}\n\n`;
    if(guide.best_time) text += `BEST TIME TO VISIT\n\n${guide.best_time}\n\n`;
    if(guide.getting_around) text += `GETTING AROUND\n\n${guide.getting_around}\n\n`;
    if(guide.closing) text += `${'─'.repeat(50)}\n\n${guide.closing}\n\n`;
    text += `\n─── beyondthepin.com ───`;
    const blob = new Blob([text],{type:'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`${guide.title.replace(/[^a-z0-9]/gi,'_')}.txt`; a.click();
  };

  return (
    <div className="fi">
      <div className="ph"><h1>Digital Products</h1><p>AI-generated destination guides. Export, upload to Gumroad, earn 90% of every sale.</p></div>
      {!apiKey&&<div className="ib">⚠ Add your Claude API key in Settings first. <button className="btn bg2b bsm" style={{marginLeft:8}} onClick={()=>setPage('settings')}>Settings →</button></div>}
      <div className="sg" style={{marginBottom:24}}>
        <div className="sc"><div className="sl">Guides Created</div><div className="sv">{guides.length}</div><div className="ss">in your library</div></div>
        <div className="sc"><div className="sl">Gumroad Cut</div><div className="sv">10%</div><div className="ss">you keep 90%</div></div>
        <div className="sc"><div className="sl">Suggested Price</div><div className="sv">$9-19</div><div className="ss">per guide</div></div>
        <div className="sc"><div className="sl">Bundle Price</div><div className="sv">$29-49</div><div className="ss">3-5 guide pack</div></div>
      </div>
      <div className="card" style={{marginBottom:24}}>
        <div className="stl" style={{fontSize:16,marginBottom:16}}>Generate New Guide</div>
        {error&&<div style={{background:'rgba(224,92,92,.1)',border:'1px solid rgba(224,92,92,.2)',borderRadius:8,padding:'12px 16px',marginBottom:16,fontSize:14,color:'var(--red)'}}>{error}</div>}
        <div className="g2" style={{gap:20,marginBottom:16}}>
          <div className="fg" style={{marginBottom:0}}><label className="lbl">Destination</label><input className="inp" placeholder="e.g. Lisbon, Portugal" value={dest} onChange={e=>setDest(e.target.value)}/></div>
          <div className="fg" style={{marginBottom:0}}><label className="lbl">Guide Type</label><select className="inp" value={guideType} onChange={e=>setGuideType(e.target.value)}>{GUIDE_TYPES.map(g=><option key={g.id} value={g.id}>{g.label}</option>)}</select></div>
        </div>
        <div style={{fontSize:13,color:'var(--ts)',marginBottom:16,fontStyle:'italic'}}>💡 {GUIDE_TYPES.find(g=>g.id===guideType)?.desc}</div>
        <button className="btn bp blg" onClick={generateGuide} disabled={generating||!dest}>{generating?<><span className="ring"/> Generating guide...</>:'📖 Generate Guide'}</button>
        {generating&&<div style={{marginTop:12,fontSize:13,color:'var(--ts)'}}>Writing your guide... takes 20-30 seconds.</div>}
      </div>
      {preview&&(
        <div className="cc fi" style={{marginBottom:24}}>
          <div className="cch"><div><div className="cct">{preview.title}</div><div style={{fontSize:13,color:'var(--ts)',marginTop:4}}>{preview.subtitle}</div></div><span className="stbd spn">Preview</span></div>
          <div style={{marginBottom:16}}><div className="csl">Introduction</div><div className="cst" style={{maxHeight:100,overflowY:'auto'}}>{preview.intro}</div></div>
          {(preview.sections||[]).slice(0,2).map((s,i)=><div key={i} style={{marginBottom:12}}><div className="csl">{s.heading}</div><div className="cst" style={{maxHeight:72,overflowY:'auto',fontSize:12}}>{s.content.slice(0,180)}...</div></div>)}
          <div style={{fontSize:12,color:'var(--td)',marginTop:4}}>+ {Math.max(0,(preview.sections?.length||0)-2)} more sections, quick tips, and more inside.</div>
          <div className="ca">

            <button className="btn bs" onClick={()=>exportGuide(preview)}>⬇ Export as Text</button>

          </div>
        </div>
      )}
      <div className="stl" style={{marginBottom:16}}>Your Guide Library ({guides.length})</div>
      {guides.length===0
        ? <div className="es"><div className="ei">📖</div><h3>No guides yet</h3><p>Generate your first destination guide above. Export it, upload to Gumroad, and start earning.</p></div>
        : guides.map(guide=>(
          <div key={guide.id} className="cc">
            <div className="cch">
              <div>
                <div className="cct" style={{fontSize:16}}>{guide.title}</div>

    </div>
  );
}

function VideoStudio({queue, published, elevenKey, pexelsKey, setPage}) {

  const [footage, setFootage] = useState([]);
  const [loadingFootage, setLoadingFootage] = useState(false);
  const [generatingVoice, setGeneratingVoice] = useState(false);
  const [voiceReady, setVoiceReady] = useState(false);
  const [error, setError] = useState('');
  const [step, setStep] = useState(1);
  const selected = approved.find(a=>a.id===selectedId);

  const searchFootage = async () => {
    if (!pexelsKey) { setError('Add your Pexels API key in Settings first.'); return; }
    setLoadingFootage(true); setError('');
    try {
      const res = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(selected.destination||'travel')}&per_page=6&orientation=landscape`,{headers:{Authorization:pexelsKey}});
      const data = await res.json(); setFootage(data.videos||[]); setStep(2);
    } catch(e) { setError('Could not fetch footage: '+e.message); }
    setLoadingFootage(false);
  };

  const generateVoiceover = async () => {
    setGeneratingVoice(true); setError('');
    try {
      const script = selected.youtube_script||selected.hook||'';
      const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/21m00Tcm4TlvDq8ikWAM`,{method:'POST',headers:{'Content-Type':'application/json','xi-api-key':elevenKey},body:JSON.stringify({text:script.slice(0,2500),model_id:'eleven_monolingual_v1',voice_settings:{stability:0.5,similarity_boost:0.75}})});
      if (!res.ok) { const err=await res.json().catch(()=>({})); throw new Error(err.detail?.message||'ElevenLabs error: '+res.status); }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download=`${selected.title||'voiceover'}.mp3`; a.click();
      setVoiceReady(true); setStep(3);
    } catch(e) { setError('Voiceover failed: '+e.message); }
    setGeneratingVoice(false);
  };

  return (
    <div className="fi">
      <div className="ph"><h1>Video Studio</h1><p>Turn approved scripts into voiceover + footage — ready to assemble in CapCut.</p></div>
      {(!elevenKey||!pexelsKey)&&<div className="ib">⚠ Add your <strong>ElevenLabs</strong> and <strong>Pexels</strong> API keys in Settings first. <button className="btn bg2b bsm" style={{marginLeft:8}} onClick={()=>setPage('settings')}>Settings →</button></div>}
      {error&&<div style={{background:'rgba(224,92,92,.1)',border:'1px solid rgba(224,92,92,.2)',borderRadius:8,padding:'12px 16px',marginBottom:20,fontSize:14,color:'var(--red)'}}>{error}</div>}
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {['1. Select Content','2. Get Footage','3. Get Voiceover'].map((s,i)=>(
          <div key={i} style={{flex:1,padding:'8px 12px',borderRadius:8,background:step>i?'var(--accd)':'var(--bgc)',border:`1px solid ${step>i?'var(--acc)':'var(--bds)'}`,fontSize:12,color:step>i?'var(--acc)':'var(--ts)',textAlign:'center'}}>{s}</div>
        ))}
      </div>
      <div className="dvd"/>
      <div className="card" style={{marginBottom:16}}>
        <div className="stl" style={{fontSize:16,marginBottom:12}}>Select Approved Content</div>
        {approved.length===0?<div className="es" style={{padding:'24px 0'}}><div className="ei">◎</div><h3>No approved content yet</h3><button className="btn bp bsm" onClick={()=>setPage('queue')}>Go to Queue →</button></div>:(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {approved.map(item=>(
              <div key={item.id} onClick={()=>{setSelectedId(item.id);setStep(1);setFootage([]);setVoiceReady(false);}} style={{padding:'12px 16px',borderRadius:8,cursor:'pointer',background:selectedId===item.id?'var(--accd)':'var(--bg)',border:`1px solid ${selectedId===item.id?'var(--acc)':'var(--bds)'}`,transition:'all .15s'}}>
                <div style={{fontWeight:600,fontSize:14}}>{item.title}</div>
                <div style={{fontSize:12,color:'var(--ts)',marginTop:2}}>{item.destination}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      {selected&&(
        <>
          <div className="card" style={{marginBottom:16}}>
            <div className="stl" style={{fontSize:16,marginBottom:8}}>Step 2 — Get Stock Footage</div>
            <p style={{fontSize:13,color:'var(--ts)',marginBottom:16}}>Searches Pexels for cinematic travel footage of <strong>{selected.destination}</strong>. Free, no watermarks.</p>
            <button className="btn bp" onClick={searchFootage} disabled={loadingFootage}>{loadingFootage?<><span className="ring"/>Searching...</>:'Search Travel Footage'}</button>
            {footage.length>0&&<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12,marginTop:16}}>{footage.map(v=><div key={v.id} style={{borderRadius:8,overflow:'hidden',border:'1px solid var(--bds)'}}><video src={v.video_files?.[0]?.link} poster={v.image} style={{width:'100%',height:120,objectFit:'cover'}} muted controls/><div style={{padding:'8px 10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:11,color:'var(--ts)'}}>{Math.round(v.duration)}s</span><a href={v.video_files?.[0]?.link} download className="btn bp bsm">Download</a></div></div>)}</div>}
          </div>
          <div className="card" style={{marginBottom:16}}>
            <div className="stl" style={{fontSize:16,marginBottom:8}}>Step 3 — Generate Voiceover</div>
            <p style={{fontSize:13,color:'var(--ts)',marginBottom:16}}>Sends your script to ElevenLabs AI → downloads as MP3. Professional travel narrator voice.</p>
            <button className="btn bp" onClick={generateVoiceover} disabled={generatingVoice}>{generatingVoice?<><span className="ring"/>Generating...</>:'Generate & Download Voiceover'}</button>
            {voiceReady&&<div style={{marginTop:16,padding:12,background:'var(--accd)',borderRadius:8,border:'1px solid var(--bdr)',fontSize:13,color:'var(--accl)'}}>✓ Voiceover downloaded! Combine with footage in CapCut, then upload to YouTube.</div>}
          </div>
          <div className="card">
            <div className="stl" style={{fontSize:16,marginBottom:8}}>Step 4 — Assemble &amp; Upload</div>
            <div style={{display:'flex',flexDirection:'column',gap:8,fontSize:13,color:'var(--ts)'}}>
              <div style={{padding:'10px 12px',background:'var(--bg)',borderRadius:8,border:'1px solid var(--bds)'}}>1. Open <strong style={{color:'var(--tp)'}}>CapCut</strong> (free) → drag in your footage clips</div>
              <div style={{padding:'10px 12px',background:'var(--bg)',borderRadius:8,border:'1px solid var(--bds)'}}>2. Drag in your voiceover MP3 as the audio track</div>
              <div style={{padding:'10px 12px',background:'var(--bg)',borderRadius:8,border:'1px solid var(--bds)'}}>3. Export as MP4 → upload to YouTube with the pre-written title, description & tags</div>
              <div style={{padding:'10px 12px',background:'var(--accd)',borderRadius:8,border:'1px solid var(--bdr)',color:'var(--accl)'}}>⚡ Once your server is ready, this step becomes fully automatic.</div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
const PLTS = [
  {id:'yt',name:'YouTube',icon:'▶',color:'#ff6b6b',fields:[{k:'yt_client_id',l:'Client ID',p:'From Google Cloud Console → OAuth 2.0'},{k:'yt_client_secret',l:'Client Secret',p:'From Google Cloud Console'},{k:'yt_refresh_token',l:'Refresh Token',p:'Generated after OAuth authentication'}],url:'https://console.cloud.google.com',steps:['Go to console.cloud.google.com','Create project → Enable YouTube Data API v3','Credentials → Create OAuth 2.0 Client ID','Paste Client ID and Secret above']},
  {id:'ig',name:'Instagram (Meta)',icon:'◎',color:'#e1306c',fields:[{k:'ig_app_id',l:'App ID',p:'From developers.facebook.com'},{k:'ig_app_secret',l:'App Secret',p:'From developers.facebook.com'},{k:'ig_access_token',l:'Access Token',p:'Long-lived user access token'},{k:'ig_user_id',l:'Instagram User ID',p:'Your Instagram Business account ID'}],url:'https://developers.facebook.com',steps:['Go to developers.facebook.com','Create App → Add Instagram Graph API','Connect Instagram Business account','Generate long-lived access token']},
  {id:'tt',name:'TikTok',icon:'♪',color:'#e0e0e0',fields:[{k:'tt_client_key',l:'Client Key',p:'From developers.tiktok.com'},{k:'tt_client_secret',l:'Client Secret',p:'From developers.tiktok.com'},{k:'tt_access_token',l:'Access Token',p:'After OAuth authorization'}],url:'https://developers.tiktok.com',steps:['Go to developers.tiktok.com','Create App → Request Content Posting API','Await approval','Complete OAuth to get access token']},
  {id:'fb',name:'Facebook',icon:'⬡',color:'#7b9fe0',fields:[{k:'fb_page_id',l:'Page ID',p:'Your Facebook Page ID'},{k:'fb_access_token',l:'Page Access Token',p:'From developers.facebook.com'}],url:'https://developers.facebook.com',steps:['Same app as Instagram (Meta)','Add Pages API to your app','Get Page ID from FB Page settings','Generate a Page Access Token']},
];

function SettingsPage({apiKey, setApiKey, platforms, setPlatforms, elevenKey, setElevenKey, pexelsKey, setPexelsKey, bannerUrl, setBannerUrl}) {
  const [lk, setLk] = useState(apiKey);
  const [lp, setLp] = useState(platforms);
  const [saved, setSaved] = useState(false);
  const [showKey, setShowKey] = useState(false);
  const [lEleven, setLEleven] = useState(elevenKey);
  const [lPexels, setLPexels] = useState(pexelsKey);
  const bannerRef = useRef(null);

  const save = () => { setApiKey(lk); setPlatforms(lp); setElevenKey(lEleven); setPexelsKey(lPexels); setSaved(true); setTimeout(()=>setSaved(false),2000); };
  const conn = (p) => p.fields.every(f => lp[f.k]&&lp[f.k].trim());

  const handleBannerUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setBannerUrl(ev.target.result);
    reader.readAsDataURL(file);
  };

  return (
    <div className="fi">
      <div className="ph"><h1>Settings</h1><p>Connect your API keys and platform credentials. Done once — runs forever.</p></div>

      {/* Banner Upload */}
      <div className="card" style={{marginBottom:24}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div><div style={{fontFamily:'Playfair Display,serif',fontSize:18,marginBottom:4}}>Dashboard Banner</div><div style={{fontSize:13,color:'var(--ts)'}}>The image shown at the top of your dashboard.</div></div>
          {bannerUrl?<span className="stbd sap">✓ Uploaded</span>:<span className="stbd spn">Not Set</span>}
        </div>
        {bannerUrl&&(
          <div style={{borderRadius:8,overflow:'hidden',marginBottom:16,height:120,background:'var(--bg)'}}>
            <img src={bannerUrl} alt="Banner preview" style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center center'}}/>
          </div>
        )}
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <input type="file" accept="image/*" ref={bannerRef} style={{display:'none'}} onChange={handleBannerUpload}/>
          <button className="btn bp bsm" onClick={()=>bannerRef.current?.click()}>📷 {bannerUrl?'Replace Banner':'Upload Banner'}</button>
          {bannerUrl&&<button className="btn bd bsm" onClick={()=>setBannerUrl('')}>Remove</button>}
        </div>
        <div style={{fontSize:11,color:'var(--td)',marginTop:10}}>Recommended: 1280×360px or wider, landscape. Your Amalfi Coast shot works perfectly.</div>
      </div>

      {/* Claude API Key */}
      <div className="card" style={{marginBottom:24}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div><div style={{fontFamily:'Playfair Display,serif',fontSize:18,marginBottom:4}}>Claude API Key</div><div style={{fontSize:13,color:'var(--ts)'}}>Powers all content generation.</div></div>
          {lk?<span className="stbd sap">✓ Connected</span>:<span className="stbd spn">Not Set</span>}
        </div>
        <div className="ib" style={{marginBottom:12}}>Get your key at <a href="https://console.anthropic.com" target="_blank" rel="noopener noreferrer" style={{color:'var(--acc)'}}>console.anthropic.com</a> → API Keys → Create Key. Cost: ~$1-3/day for daily content.</div>
        <div style={{position:'relative'}}>
          <input className="inp" type={showKey?'text':'password'} placeholder="sk-ant-api03-..." value={lk} onChange={e=>setLk(e.target.value)}/>
          <button style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--td)',cursor:'pointer',fontSize:12}} onClick={()=>setShowKey(s=>!s)}>{showKey?'Hide':'Show'}</button>
        </div>
      </div>

      {/* Platform Connections */}
      <div className="stl" style={{marginBottom:16}}>Platform Connections</div>
      <div className="ib" style={{marginBottom:24}}>Each platform requires a one-time developer setup. Once credentials are saved, the agent handles all publishing automatically.</div>
      {PLTS.map(plt=>(
        <div key={plt.id} className="card" style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontSize:22,color:plt.color}}>{plt.icon}</span>
              <div><div style={{fontWeight:600,fontSize:16}}>{plt.name}</div><div style={{fontSize:12,color:'var(--td)'}}>{plt.fields.length} credentials required</div></div>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              {conn(plt)?<span className="stbd sap">✓ Connected</span>:<span className="stbd spn">Setup Needed</span>}
              <a href={plt.url} target="_blank" rel="noopener noreferrer" className="btn bg2b bsm">Setup →</a>
            </div>
          </div>
          <div style={{background:'var(--bg)',borderRadius:8,padding:12,marginBottom:16,border:'1px solid var(--bds)'}}>
            <div style={{fontSize:11,color:'var(--td)',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Steps</div>
            {plt.steps.map((s,i)=><div key={i} style={{fontSize:12,color:'var(--ts)',padding:'3px 0'}}>{i+1}. {s}</div>)}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {plt.fields.map(f=>(
              <div key={f.k}>
                <label className="lbl" style={{fontSize:11}}>{f.l}</label>
                <div style={{position:'relative'}}>
                  <input className="inp" type="password" id={`field-${f.k}`} placeholder={f.p} value={lp[f.k]||''} onChange={e=>setLp(p=>({...p,[f.k]:e.target.value}))} style={{paddingRight:90}}/>
                  <div style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',display:'flex',gap:4}}>
                    <button style={{background:'none',border:'none',color:'var(--td)',cursor:'pointer',fontSize:11,padding:'2px 6px'}} onClick={()=>{const el=document.getElementById(`field-${f.k}`);if(el)el.type=el.type==='password'?'text':'password';}}>Show</button>
                    {lp[f.k]&&<button style={{background:'none',border:'none',color:'var(--td)',cursor:'pointer',fontSize:11,padding:'2px 6px'}} onClick={()=>navigator.clipboard.writeText(lp[f.k])}>Copy</button>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}

      {/* ElevenLabs */}
      <div className="card" style={{marginBottom:24}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div><div style={{fontFamily:'Playfair Display,serif',fontSize:18,marginBottom:4}}>ElevenLabs API Key</div><div style={{fontSize:13,color:'var(--ts)'}}>Powers AI voiceover generation.</div></div>
          {lEleven?<span className="stbd sap">✓ Connected</span>:<span className="stbd spn">Not Set</span>}
        </div>
        <div className="ib" style={{marginBottom:12}}>Get key at <a href="https://elevenlabs.io" target="_blank" rel="noopener noreferrer" style={{color:'var(--acc)'}}>elevenlabs.io</a> → Profile → API Keys</div>
        <input className="inp" type="password" placeholder="Your ElevenLabs API key" value={lEleven} onChange={e=>setLEleven(e.target.value)}/>
      </div>

      {/* Pexels */}
      <div className="card" style={{marginBottom:24}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div><div style={{fontFamily:'Playfair Display,serif',fontSize:18,marginBottom:4}}>Pexels API Key</div><div style={{fontSize:13,color:'var(--ts)'}}>Powers free stock travel photos and footage.</div></div>
          {lPexels?<span className="stbd sap">✓ Connected</span>:<span className="stbd spn">Not Set</span>}
        </div>
        <div className="ib" style={{marginBottom:12}}>Get key at <a href="https://pexels.com/api" target="_blank" rel="noopener noreferrer" style={{color:'var(--acc)'}}>pexels.com/api</a> → Your API Key (free)</div>
        <input className="inp" type="password" placeholder="Your Pexels API key" value={lPexels} onChange={e=>setLPexels(e.target.value)}/>
      </div>

      <button className="btn bp blg" onClick={save}>{saved?'✓ All Settings Saved!':'Save All Settings'}</button>
      {saved&&<span style={{marginLeft:12,fontSize:13,color:'var(--grn)'}}>Saved successfully.</span>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
