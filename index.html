<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Beyond the Pin — Content Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bgc:#16161f;--bgh:#1e1e2a;--acc:#c9a96e;--accl:#e8c99a;--accd:rgba(201,169,110,0.15);--tp:#f0ece4;--ts:#8a8699;--td:#4a4760;--bdr:rgba(201,169,110,0.12);--bds:rgba(255,255,255,0.06);--grn:#4caf82;--red:#e05c5c;--blu:#5c9de0;--sw:240px;--r:12px;--bnav:64px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tp);min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:'Playfair Display',serif}
.shell{display:flex;min-height:100vh}
.main{margin-left:var(--sw);flex:1;padding:40px;max-width:calc(100vw - var(--sw));overflow-y:auto}
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--bdr);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
.slogo{padding:28px 24px 20px;border-bottom:1px solid var(--bds)}
.lm{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--acc)}
.lt{font-size:10px;color:var(--td);letter-spacing:.5px;margin-top:4px;text-transform:uppercase}
.snav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:2px}
.nlbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--td);padding:12px 12px 6px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--ts);font-size:14px;font-weight:500;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:var(--bgh);color:var(--tp)}
.ni.active{background:var(--accd);color:var(--acc)}
.nbdg{margin-left:auto;background:var(--acc);color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.sftr{padding:16px;border-top:1px solid var(--bds);font-size:12px;color:var(--ts)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--grn);display:inline-block;margin-right:8px;box-shadow:0 0 6px var(--grn)}
.ph{margin-bottom:32px}
.ph h1{font-size:32px;font-weight:700;line-height:1.1}
.ph p{color:var(--ts);margin-top:6px;font-size:14px}
.al{color:var(--acc);font-style:italic;font-family:'Playfair Display',serif;font-size:13px;margin-top:4px}
.card{background:var(--bgc);border:1px solid var(--bds);border-radius:var(--r);padding:24px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.sc{background:var(--bgc);border:1px solid var(--bds);border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc),transparent)}
.sl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--td);margin-bottom:8px}
.sv{font-family:'Playfair Display',serif;font-size:28px;font-weight:700}
.ss{font-size:12px;color:var(--ts);margin-top:4px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif;text-decoration:none;-webkit-tap-highlight-color:transparent}
.bp{background:var(--acc);color:#000}.bp:hover{background:var(--accl)}
.bs{background:var(--bgh);color:var(--tp);border:1px solid var(--bds)}.bs:hover{border-color:var(--acc);color:var(--acc)}
.bg2b{background:transparent;color:var(--ts);border:1px solid var(--bds)}.bg2b:hover{background:var(--bgh);color:var(--tp)}
.bd{background:rgba(224,92,92,.15);color:var(--red);border:1px solid rgba(224,92,92,.2)}
.bsc{background:rgba(76,175,130,.15);color:var(--grn);border:1px solid rgba(76,175,130,.2)}
.big2{background:rgba(225,48,108,.15);color:#e1306c;border:1px solid rgba(225,48,108,.2)}
.bfb2{background:rgba(66,103,178,.15);color:#7b9fe0;border:1px solid rgba(66,103,178,.2)}
.bsm{padding:6px 14px!important;font-size:12px!important}
.blg{padding:14px 28px;font-size:15px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.inp{width:100%;background:var(--bg);border:1px solid var(--bds);border-radius:8px;padding:12px 14px;color:var(--tp);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--td)}
textarea.inp{resize:vertical;min-height:100px;line-height:1.6}
.lbl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--ts);margin-bottom:6px;display:block}
.fg{margin-bottom:20px}
.pbd{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.byt{background:rgba(255,0,0,.15);color:#ff6b6b}
.big{background:rgba(225,48,108,.15);color:#e1306c}
.btt{background:rgba(255,255,255,.08);color:#e0e0e0}
.bfb{background:rgba(66,103,178,.15);color:#7b9fe0}
.stbd{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.spn{background:rgba(201,169,110,.15);color:var(--acc)}
.sap{background:rgba(76,175,130,.15);color:var(--grn)}
.srj{background:rgba(224,92,92,.15);color:var(--red)}
.spb{background:rgba(92,157,224,.15);color:var(--blu)}
.cc{background:var(--bgc);border:1px solid var(--bds);border-radius:var(--r);padding:24px;margin-bottom:16px}
.cch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px}
.cct{font-family:'Playfair Display',serif;font-size:18px;line-height:1.3}
.ccm{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.csl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--td);margin-bottom:6px}
.cst{font-size:13px;color:var(--ts);line-height:1.6;background:var(--bg);padding:12px;border-radius:8px;border:1px solid var(--bds);white-space:pre-wrap}
.ca{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--bds);flex-wrap:wrap}
.tabs{display:flex;border-bottom:1px solid var(--bds);margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;font-size:13px;font-weight:500;color:var(--ts);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--tp)}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.ring{width:20px;height:20px;border:2px solid var(--bds);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.es{text-align:center;padding:48px 24px;color:var(--ts)}
.ei{font-size:40px;margin-bottom:16px;opacity:.4}
.dvd{height:1px;background:var(--bds);margin:24px 0}
.stl{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:16px}
.pb{height:4px;background:var(--bgh);border-radius:2px;overflow:hidden;margin-top:8px}
.pf{height:100%;background:linear-gradient(90deg,var(--acc),var(--accl));border-radius:2px;transition:width .5s}
.ib{background:var(--accd);border:1px solid var(--bdr);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--accl);line-height:1.6;margin-bottom:20px}
.fi{animation:fadeIn .3s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--td);border-radius:3px}
.mob-header{display:none}
.mob-nav{display:none}
.pub-panel{background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:16px;margin-top:16px}
.pub-panel-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--acc);margin-bottom:12px}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.img-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.img-thumb.selected{border-color:var(--acc);box-shadow:0 0 0 2px var(--accd)}
.pub-status{font-size:12px;padding:8px 12px;border-radius:6px;margin-top:8px}
.pub-ok{background:rgba(76,175,130,.15);color:var(--grn);border:1px solid rgba(76,175,130,.2)}
.pub-err{background:rgba(224,92,92,.1);color:var(--red);border:1px solid rgba(224,92,92,.2)}
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0;padding:16px;padding-bottom:calc(var(--bnav) + 16px);max-width:100%}
  .g2{grid-template-columns:1fr}
  .sg{grid-template-columns:1fr 1fr}
  .ph h1{font-size:24px}
  .mob-header{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--bg2);border-bottom:1px solid var(--bds);margin:-16px -16px 24px -16px;position:sticky;top:0;z-index:50}
  .mob-header .lm{font-size:16px}
  .mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bds);z-index:100;height:var(--bnav);padding-bottom:env(safe-area-inset-bottom)}
  .mob-ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--ts);font-size:9px;font-family:'DM Sans',sans-serif;font-weight:500;padding:8px 4px;-webkit-tap-highlight-color:transparent;position:relative}
  .mob-ni.active{color:var(--acc)}
  .mob-ni-icon{font-size:18px;line-height:1}
  .mob-ni-bdg{position:absolute;top:6px;right:calc(50% - 14px);background:var(--acc);color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}
  .ca{flex-direction:column}
  .ca .btn{width:100%;justify-content:center}
  .bsm{padding:10px 14px!important;font-size:13px!important}
  .card{padding:16px}
  .cc{padding:16px}
  .img-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect} = React;

function App() {
  const [page, setPage] = useState('dashboard');
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('btp_api') || '');
  const [elevenKey, setElevenKey] = useState(() => localStorage.getItem('btp_eleven') || '');
  const [pexelsKey, setPexelsKey] = useState(() => localStorage.getItem('btp_pexels') || '');
  const [queue, setQueue] = useState(() => { try { return JSON.parse(localStorage.getItem('btp_q') || '[]'); } catch { return []; } });
  const [published, setPublished] = useState(() => { try { return JSON.parse(localStorage.getItem('btp_pub') || '[]'); } catch { return []; } });
  const [affiliates, setAffiliates] = useState(() => { try { return JSON.parse(localStorage.getItem('btp_aff') || '{}'); } catch { return {}; } });
  const [platforms, setPlatforms] = useState(() => { try { return JSON.parse(localStorage.getItem('btp_plt') || '{}'); } catch { return {}; } });

  useEffect(() => { localStorage.setItem('btp_api', apiKey); }, [apiKey]);
  useEffect(() => { localStorage.setItem('btp_eleven', elevenKey); }, [elevenKey]);
  useEffect(() => { localStorage.setItem('btp_pexels', pexelsKey); }, [pexelsKey]);
  useEffect(() => { localStorage.setItem('btp_q', JSON.stringify(queue)); }, [queue]);
  useEffect(() => { localStorage.setItem('btp_pub', JSON.stringify(published)); }, [published]);
  useEffect(() => { localStorage.setItem('btp_aff', JSON.stringify(affiliates)); }, [affiliates]);
  useEffect(() => { localStorage.setItem('btp_plt', JSON.stringify(platforms)); }, [platforms]);

  const approve = (id) => {
    const item = queue.find(q => q.id === id);
    if (item) {
      setPublished(p => [...p, { ...item, status: 'approved', approvedAt: new Date().toISOString() }]);
      setQueue(q => q.filter(i => i.id !== id));
    }
  };
  const reject = (id) => setQueue(q => q.map(i => i.id === id ? { ...i, status: 'rejected' } : i));
  const editItem = (id, u) => setQueue(q => q.map(i => i.id === id ? { ...i, ...u } : i));
  const addToQueue = (item) => setQueue(q => [...q, { ...item, id: Date.now() + Math.random(), status: 'pending', createdAt: new Date().toISOString() }]);

  const pending = queue.filter(q => q.status === 'pending').length;
  const nav = [
    { id: 'dashboard', icon: '◈', label: 'Dashboard' },
    { id: 'generate', icon: '✦', label: 'Generate Content' },
    { id: 'queue', icon: '◎', label: 'Approval Queue', badge: pending },
    { id: 'calendar', icon: '▦', label: 'Content Calendar' },
    { id: 'monetization', icon: '◆', label: 'Monetization' },
    { id: 'video', icon: '▶', label: 'Video Studio' },
    { id: 'settings', icon: '◉', label: 'Settings' },
  ];

  const pages = { dashboard: Dashboard, generate: Generate, queue: QueuePage, calendar: CalendarPage, monetization: Monetization, video: VideoStudio, settings: SettingsPage };
  const Page = pages[page] || Dashboard;
  const mobNav = [
    {id:'dashboard',icon:'◈',label:'Home'},
    {id:'generate',icon:'✦',label:'Create'},
    {id:'queue',icon:'◎',label:'Queue',badge:pending},
    {id:'monetization',icon:'◆',label:'Money'},
    {id:'video',icon:'▶',label:'Video'},
    {id:'settings',icon:'◉',label:'Settings'},
  ];

  return (
    <div className="shell">
      <aside className="sidebar">
        <div className="slogo">
          <div className="lm">Beyond the Pin</div>
          <div className="lt">Content Command Center</div>
        </div>
        <nav className="snav">
          <div className="nlbl">Navigation</div>
          {nav.map(n => (
            <button key={n.id} className={`ni ${page === n.id ? 'active' : ''}`} onClick={() => setPage(n.id)}>
              <span style={{fontSize:16,width:20,textAlign:'center'}}>{n.icon}</span>
              {n.label}
              {n.badge > 0 && <span className="nbdg">{n.badge}</span>}
            </button>
          ))}
        </nav>
        <div className="sftr"><span className="sdot" />Agent Active</div>
      </aside>
      <main className="main">
        <div className="mob-header">
          <div className="lm">Beyond the Pin</div>
          <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--ts)'}}>
            <span className="sdot"/><span>Live</span>
          </div>
        </div>
        <Page queue={queue} published={published} affiliates={affiliates} setAffiliates={setAffiliates}
          platforms={platforms} setPlatforms={setPlatforms} apiKey={apiKey} setApiKey={setApiKey}
          elevenKey={elevenKey} setElevenKey={setElevenKey} pexelsKey={pexelsKey} setPexelsKey={setPexelsKey}
          approve={approve} reject={reject} editItem={editItem} addToQueue={addToQueue} setPage={setPage} />
      </main>
      <nav className="mob-nav">
        {mobNav.map(n => (
          <button key={n.id} className={`mob-ni ${page === n.id ? 'active' : ''}`} onClick={() => setPage(n.id)}>
            {n.badge > 0 && <span className="mob-ni-bdg">{n.badge}</span>}
            <span className="mob-ni-icon">{n.icon}</span>
            <span>{n.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

function Plats() {
  return (
    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
      <span className="pbd byt">▶ YouTube</span>
      <span className="pbd big">◎ Instagram</span>
      <span className="pbd btt">♪ TikTok</span>
      <span className="pbd bfb">⬡ Facebook</span>
    </div>
  );
}

function Dashboard({ queue, published, setPage }) {
  const pending = queue.filter(q => q.status === 'pending').length;
  const recent = [...queue, ...published].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 5);
  return (
    <div className="fi">
      <div className="ph">
        <h1>Command Center</h1>
        <p>Your Beyond the Pin operation at a glance.</p>
        <div className="al">"Beyond every board or pin lives an experience."</div>
      </div>
      <div className="sg">
        <div className="sc">
          <div className="sl">Awaiting Approval</div>
          <div className="sv" style={{color: pending > 0 ? 'var(--acc)' : 'var(--tp)'}}>{pending}</div>
          <div className="ss">pieces need review</div>
          {pending > 0 && <button className="btn bp bsm" style={{marginTop:12}} onClick={() => setPage('queue')}>Review Now →</button>}
        </div>
        <div className="sc"><div className="sl">Published</div><div className="sv">{published.length}</div><div className="ss">pieces approved</div></div>
        <div className="sc"><div className="sl">Total Content</div><div className="sv">{queue.length + published.length}</div><div className="ss">pieces generated</div></div>
        <div className="sc"><div className="sl">Active Platforms</div><div className="sv">4</div><div className="ss">YT · IG · TikTok · FB</div></div>
      </div>
      <div className="g2" style={{gap:20,marginBottom:24}}>
        <div className="card">
          <div className="stl" style={{fontSize:16,marginBottom:16}}>Quick Actions</div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <button className="btn bp" onClick={() => setPage('generate')}>✦ Generate New Content</button>
            <button className="btn bs" onClick={() => setPage('queue')}>◎ Approval Queue {pending > 0 && `(${pending})`}</button>
            <button className="btn bs" onClick={() => setPage('calendar')}>▦ Content Calendar</button>
            <button className="btn bs" onClick={() => setPage('monetization')}>◆ Monetization</button>
          </div>
          <div className="dvd" />
          <div className="ib"><strong>Workflow:</strong> Generate → Approve → Pick image → Post to Instagram &amp; Facebook instantly.</div>
        </div>
        <div className="card">
          <div className="stl" style={{fontSize:16,marginBottom:16}}>Platform Status</div>
          {['YouTube','Instagram','TikTok','Facebook'].map(p => (
            <div key={p} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--bds)'}}>
              <span style={{fontSize:14,fontWeight:500}}>{p}</span>
              <button className="btn bg2b bsm" onClick={() => setPage('settings')}>Connect</button>
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <div className="stl" style={{fontSize:16,marginBottom:16}}>Recent Content</div>
        {recent.length === 0 ? (
          <div className="es"><div className="ei">✦</div><h3>No content yet</h3><p>Generate your first piece to get started.</p><button className="btn bp" style={{marginTop:16}} onClick={() => setPage('generate')}>Generate Content</button></div>
        ) : recent.map(item => (
          <div key={item.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderBottom:'1px solid var(--bds)'}}>
            <div>
              <div style={{fontSize:14,fontWeight:500,marginBottom:4}}>{item.title}</div>
              <div style={{fontSize:12,color:'var(--td)'}}>{item.destination} · {new Date(item.createdAt).toLocaleDateString()}</div>
            </div>
            <span className={`stbd ${item.status === 'pending' ? 'spn' : item.status === 'approved' ? 'sap' : 'srj'}`}>{item.status}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

const CTYPES = [
  {id:'hidden_gems',label:'Hidden Gems',desc:'Lesser-known spots in famous destinations'},
  {id:'tourist_vs_local',label:'Tourist vs Local',desc:'What boards show vs what locals know'},
  {id:'itinerary',label:'Full Itinerary',desc:'Day-by-day destination breakdown'},
  {id:'budget_guide',label:'Budget Guide',desc:'How to experience it for less'},
  {id:'luxury_guide',label:'Luxury Guide',desc:'The best of the best, curated'},
  {id:'seasonal',label:'Best Time to Visit',desc:'Seasonal breakdown with insider tips'},
];

function Generate({ apiKey, addToQueue, affiliates, setPage }) {
  const [dest, setDest] = useState('');
  const [ctype, setCtype] = useState('hidden_gems');
  const [generating, setGenerating] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [weekMode, setWeekMode] = useState(false);
  const [weekResults, setWeekResults] = useState([]);
  const [weekGen, setWeekGen] = useState(false);
  const [weekPct, setWeekPct] = useState(0);
  const [activeTab, setActiveTab] = useState('script');

  const affLinks = () => {
    const l = [];
    if (affiliates.booking) l.push(`Book your stay: ${affiliates.booking}`);
    if (affiliates.viator) l.push(`Tours & Experiences: ${affiliates.viator}`);
    if (affiliates.getyourguide) l.push(`Guided tours: ${affiliates.getyourguide}`);
    if (affiliates.amazon) l.push(`Travel essentials: ${affiliates.amazon}`);
    return l.length > 0 ? l.join('\n') : 'Book your stay: [ADD YOUR BOOKING.COM AFFILIATE LINK]\nTours: [ADD YOUR VIATOR LINK]';
  };

  const genContent = async (d, t) => {
    if (!apiKey) throw new Error('NO_KEY');
    const ct = CTYPES.find(c => c.id === t);
    const prompt = `You are the AI content engine for "Beyond the Pin" — a faceless travel YouTube channel.
Brand: Beyond the Pin | Tagline: "Beyond every board or pin lives an experience."
Voice: Cinematic, curious, experiential. Goes deeper than Pinterest boards. Reveals what curated content misses.
Rotating taglines to use: "Unpin the ordinary." / "Drop the pin. Then go further." / "The world doesn't fit in a board." / "Stop scrolling. Start going." / "What the board can't capture." / "You saved it. Now live it."

Generate for: [${d}] | Type: ${ct?.label} — ${ct?.desc}

Respond ONLY with valid JSON, no markdown, no extra text:
{"title":"Video title max 60 chars","hook":"Opening 2-3 sentences that grab immediately","youtube_script":"Full narration 600-900 words with hook, 3-5 sections, affiliate CTA woven in naturally, closing tagline","youtube_description":"Full YT description 300 words with overview, timestamps placeholder, affiliate links, subscribe CTA, hashtags","youtube_tags":["tag1","tag2","tag3","tag4","tag5","tag6","tag7","tag8","tag9","tag10"],"instagram_caption":"Instagram Reels caption max 150 words, hook first line, storytelling, CTA, 15 hashtags at end","tiktok_caption":"TikTok caption max 100 words, punchy, 3-5 hashtags, strong CTA","facebook_caption":"Facebook caption max 200 words, conversational, question for comments, CTA, 5 hashtags","tagline_used":"The rotating tagline used","pinned_comment":"Pinned comment with affiliate links embedded","comment_reply_templates":["Reply template 1","Reply template 2","Reply template 3"],"b_roll_suggestions":["Shot 1","Shot 2","Shot 3","Shot 4","Shot 5"],"thumbnail_concept":"Thumbnail visual description for AI image gen"}

Affiliate links to embed naturally:
${affLinks()}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: 'claude-opus-4-5', max_tokens: 3000, messages: [{ role: 'user', content: prompt }] })
    });
    const rawText = await res.text();
    let data;
    try { data = JSON.parse(rawText); } catch(e) { throw new Error('Invalid response from server'); }
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    if (!data.content || !data.content.length) throw new Error('No content in response: ' + rawText.slice(0, 200));
    const text = data.content.map(i => i.text || '').join('');
    let parsed;
    try {
      const clean = text.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      const match = text.match(/\{[\s\S]*\}/);
      if (match) {
        try { parsed = JSON.parse(match[0]); }
        catch(e2) { throw new Error('Could not parse AI response as JSON'); }
      } else {
        throw new Error('Could not parse AI response as JSON');
      }
    }
    return { ...parsed, destination: d, contentType: t };
  };

  const handleGen = async () => {
    if (!dest.trim()) { setError('Enter a destination.'); return; }
    if (!apiKey) { setError('Add your Claude API key in Settings first.'); return; }
    setError(''); setGenerating(true); setResult(null);
    try { setResult(await genContent(dest, ctype)); }
    catch (e) { setError(e.message === 'NO_KEY' ? 'Add your Claude API key in Settings first.' : 'Error: ' + e.message); }
    setGenerating(false);
  };

  const handleWeek = async () => {
    if (!apiKey) { setError('Add your Claude API key in Settings first.'); return; }
    const dests = [
      {d:'Santorini, Greece',t:'hidden_gems'},{d:'Kyoto, Japan',t:'tourist_vs_local'},
      {d:'Lisbon, Portugal',t:'budget_guide'},{d:'Amalfi Coast, Italy',t:'luxury_guide'},
      {d:'Marrakech, Morocco',t:'itinerary'},{d:'Bali, Indonesia',t:'seasonal'},{d:'Iceland',t:'hidden_gems'},
    ];
    setWeekGen(true); setWeekResults([]); setWeekPct(0);
    const results = [];
    for (let i = 0; i < dests.length; i++) {
      try { const r = await genContent(dests[i].d, dests[i].t); if (r) results.push(r); }
      catch (e) { console.error(e); }
      setWeekPct(Math.round(((i + 1) / dests.length) * 100));
    }
    setWeekResults(results); setWeekGen(false);
  };

  const toQueue = (r) => addToQueue({ title: r.title, destination: r.destination, contentType: r.contentType, hook: r.hook, youtube_script: r.youtube_script, youtube_description: r.youtube_description, youtube_tags: r.youtube_tags, instagram_caption: r.instagram_caption, tiktok_caption: r.tiktok_caption, facebook_caption: r.facebook_caption, tagline_used: r.tagline_used, pinned_comment: r.pinned_comment, comment_reply_templates: r.comment_reply_templates, b_roll_suggestions: r.b_roll_suggestions, thumbnail_concept: r.thumbnail_concept });

  const tabs = [{id:'script',l:'YT Script'},{id:'desc',l:'YT Description'},{id:'ig',l:'Instagram'},{id:'tt',l:'TikTok'},{id:'fb',l:'Facebook'},{id:'broll',l:'B-Roll'},{id:'eng',l:'Engagement'}];

  return (
    <div className="fi">
      <div className="ph"><h1>Generate Content</h1><p>AI-powered content for all platforms. You approve before anything goes live.</p></div>
      {!apiKey && <div className="ib">⚠ <strong>API Key Required:</strong> Go to Settings and add your Claude API key first. <button className="btn bg2b bsm" style={{marginLeft:8}} onClick={() => setPage('settings')}>Settings →</button></div>}
      {error && <div style={{background:'rgba(224,92,92,.1)',border:'1px solid rgba(224,92,92,.2)',borderRadius:8,padding:'12px 16px',marginBottom:20,fontSize:14,color:'var(--red)'}}>{error}</div>}
      <div className="tabs">
        <button className={`tab ${!weekMode ? 'active' : ''}`} onClick={() => setWeekMode(false)}>Single Piece</button>
        <button className={`tab ${weekMode ? 'active' : ''}`} onClick={() => setWeekMode(true)}>Weekly Calendar (7 pieces)</button>
      </div>
      {!weekMode ? (
        <>
          <div className="card" style={{marginBottom:24}}>
            <div className="g2" style={{gap:20}}>
              <div className="fg" style={{marginBottom:0}}>
                <label className="lbl">Destination</label>
                <input className="inp" placeholder="e.g. Santorini, Greece" value={dest} onChange={e => setDest(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleGen()} />
              </div>
              <div className="fg" style={{marginBottom:0}}>
                <label className="lbl">Content Type</label>
                <select className="inp" value={ctype} onChange={e => setCtype(e.target.value)}>
                  {CTYPES.map(t => <option key={t.id} value={t.id}>{t.label} — {t.desc}</option>)}
                </select>
              </div>
            </div>
            <div style={{marginTop:20}}>
              <button className="btn bp blg" onClick={handleGen} disabled={generating || !dest}>
                {generating ? <><span className="ring" /> Generating...</> : '✦ Generate All Platform Content'}
              </button>
            </div>
          </div>
          {generating && <div className="card" style={{display:'flex',flexDirection:'column',alignItems:'center',padding:48,gap:16,color:'var(--ts)'}}><span className="ring" style={{width:32,height:32,borderWidth:3}} /><p>Writing scripts, captions, hashtags & affiliate CTAs for all 4 platforms...</p><p style={{fontSize:12,color:'var(--td)'}}>Takes about 15-20 seconds</p></div>}
          {result && !generating && (
            <div className="cc fi">
              <div className="cch">
                <div>
                  <div className="cct">{result.title}</div>
                  <div className="ccm"><Plats /></div>
                  {result.tagline_used && <div style={{fontSize:12,color:'var(--acc)',marginTop:8,fontStyle:'italic'}}>"{result.tagline_used}"</div>}
                </div>
                <span className="stbd spn">Ready for Review</span>
              </div>
              <div style={{marginBottom:14}}><div className="csl">Hook</div><div className="cst">{result.hook}</div></div>
              <div className="tabs" style={{marginBottom:16}}>
                {tabs.map(t => <button key={t.id} className={`tab ${activeTab === t.id ? 'active' : ''}`} onClick={() => setActiveTab(t.id)}>{t.l}</button>)}
              </div>
              {activeTab === 'script' && <div className="cst" style={{maxHeight:350,overflowY:'auto'}}>{result.youtube_script}</div>}
              {activeTab === 'desc' && <div className="cst" style={{maxHeight:350,overflowY:'auto'}}>{result.youtube_description}{result.youtube_tags && <div style={{marginTop:16,paddingTop:16,borderTop:'1px solid var(--bds)'}}><div className="csl">TAGS</div><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{result.youtube_tags.map((t,i) => <span key={i} style={{background:'var(--bgh)',padding:'2px 8px',borderRadius:4,fontSize:12,color:'var(--ts)'}}>{t}</span>)}</div></div>}</div>}
              {activeTab === 'ig' && <div className="cst">{result.instagram_caption}</div>}
              {activeTab === 'tt' && <div className="cst">{result.tiktok_caption}</div>}
              {activeTab === 'fb' && <div className="cst">{result.facebook_caption}</div>}
              {activeTab === 'broll' && <div><div style={{marginBottom:14}}><div className="csl">B-Roll Shot List</div><div className="cst">{result.b_roll_suggestions?.map((s,i) => `${i+1}. ${s}`).join('\n')}</div></div><div><div className="csl">Thumbnail Concept</div><div className="cst">{result.thumbnail_concept}</div></div></div>}
              {activeTab === 'eng' && <div><div style={{marginBottom:14}}><div className="csl">Pinned Comment</div><div className="cst">{result.pinned_comment}</div></div><div><div className="csl">Reply Templates</div><div className="cst">{result.comment_reply_templates?.map((t,i) => `Reply ${i+1}:\n${t}`).join('\n\n')}</div></div></div>}
              <div className="ca">
                <button className="btn bp" onClick={() => { toQueue(result); setResult(null); setDest(''); setPage('queue'); }}>✓ Send to Approval Queue</button>
                <button className="btn bg2b" onClick={handleGen}>↻ Regenerate</button>
              </div>
            </div>
          )}
        </>
      ) : (
        <>
          <div className="card" style={{marginBottom:24}}>
            <div className="stl" style={{fontSize:16,marginBottom:8}}>Weekly Content Calendar</div>
            <p style={{fontSize:14,color:'var(--ts)',marginBottom:20}}>Generates 7 pieces across trending destinations — one per day. All go to your approval queue.</p>
            <button className="btn bp blg" onClick={handleWeek} disabled={weekGen}>
              {weekGen ? <><span className="ring" /> Generating week...</> : '✦ Generate Full Week'}
            </button>
            {weekGen && <div style={{marginTop:20}}><div style={{fontSize:13,color:'var(--ts)',marginBottom:8}}>Generating... {weekPct}% complete</div><div className="pb"><div className="pf" style={{width:`${weekPct}%`}} /></div></div>}
          </div>
          {weekResults.length > 0 && (
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <div className="stl">{weekResults.length} Pieces Ready</div>
                <button className="btn bp" onClick={() => { weekResults.forEach(r => toQueue(r)); setWeekResults([]); setPage('queue'); }}>Send All to Queue →</button>
              </div>
              {weekResults.map((r, i) => (
                <div key={i} className="cc">
                  <div className="cch">
                    <div><div className="cct">{r.title}</div><div className="ccm"><Plats /></div></div>
                    <button className="btn bsc bsm" onClick={() => { toQueue(r); setWeekResults(weekResults.filter((_, j) => j !== i)); }}>Add to Queue</button>
                  </div>
                  <div style={{fontSize:13,color:'var(--ts)'}}>{r.hook}</div>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ── PUBLISH PANEL ─────────────────────────────────────────────────────────────
function PublishPanel({ item, platforms, pexelsKey }) {
  const [images, setImages] = useState([]);
  const [loadingImgs, setLoadingImgs] = useState(false);
  const [selectedImg, setSelectedImg] = useState(null);
  const [igStatus, setIgStatus] = useState('');
  const [fbStatus, setFbStatus] = useState('');
  const [igPosting, setIgPosting] = useState(false);
  const [fbPosting, setFbPosting] = useState(false);
  const [imgError, setImgError] = useState('');

  const igReady = platforms.ig_access_token && platforms.ig_user_id;
  const fbReady = platforms.fb_access_token && platforms.fb_page_id;
  const pexReady = !!pexelsKey;

  const searchImages = async () => {
    if (!pexelsKey) { setImgError('Add Pexels API key in Settings.'); return; }
    setLoadingImgs(true); setImgError(''); setImages([]);
    try {
      const q = item.destination || 'travel landscape';
      const res = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(q)}&per_page=9&orientation=landscape`, {
        headers: { Authorization: pexelsKey }
      });
      const data = await res.json();
      setImages(data.photos || []);
    } catch(e) { setImgError('Could not load images: ' + e.message); }
    setLoadingImgs(false);
  };

  const postToInstagram = async () => {
    if (!selectedImg) { setIgStatus('error:Pick an image first.'); return; }
    if (!igReady) { setIgStatus('error:Add Instagram credentials in Settings.'); return; }
    setIgPosting(true); setIgStatus('posting');
    try {
      const caption = item.instagram_caption || item.hook || '';
      const imageUrl = selectedImg.src.large;
      // Step 1: Create media container
      const createRes = await fetch(
        `https://graph.facebook.com/v18.0/${platforms.ig_user_id}/media?image_url=${encodeURIComponent(imageUrl)}&caption=${encodeURIComponent(caption)}&access_token=${platforms.ig_access_token}`,
        { method: 'POST' }
      );
      const createData = await createRes.json();
      if (createData.error) throw new Error(createData.error.message);
      const containerId = createData.id;
      // Step 2: Publish container
      const pubRes = await fetch(
        `https://graph.facebook.com/v18.0/${platforms.ig_user_id}/media_publish?creation_id=${containerId}&access_token=${platforms.ig_access_token}`,
        { method: 'POST' }
      );
      const pubData = await pubRes.json();
      if (pubData.error) throw new Error(pubData.error.message);
      setIgStatus('ok:Posted to Instagram! Post ID: ' + pubData.id);
    } catch(e) { setIgStatus('error:' + e.message); }
    setIgPosting(false);
  };

  const postToFacebook = async () => {
    if (!selectedImg) { setFbStatus('error:Pick an image first.'); return; }
    if (!fbReady) { setFbStatus('error:Add Facebook credentials in Settings.'); return; }
    setFbPosting(true); setFbStatus('posting');
    try {
      const caption = item.facebook_caption || item.hook || '';
      const imageUrl = selectedImg.src.large;
      const res = await fetch(
        `https://graph.facebook.com/v18.0/${platforms.fb_page_id}/photos`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: imageUrl, caption, access_token: platforms.fb_access_token })
        }
      );
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      setFbStatus('ok:Posted to Facebook! Post ID: ' + data.post_id);
    } catch(e) { setFbStatus('error:' + e.message); }
    setFbPosting(false);
  };

  const statusEl = (s, posting) => {
    if (posting) return <div className="pub-status" style={{background:'var(--accd)',color:'var(--acc)',border:'1px solid var(--bdr)'}}><span className="ring" style={{width:14,height:14,borderWidth:2,marginRight:8}}/>Posting...</div>;
    if (!s) return null;
    if (s === 'posting') return null;
    const [type, msg] = s.split(/:(.+)/);
    return <div className={`pub-status ${type === 'ok' ? 'pub-ok' : 'pub-err'}`}>{type === 'ok' ? '✓ ' : '✕ '}{msg}</div>;
  };

  return (
    <div className="pub-panel">
      <div className="pub-panel-title">◎ Publish to Social</div>

      {/* Image picker */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12,color:'var(--ts)',marginBottom:8}}>1. Pick a photo for the post</div>
        {!pexReady && <div style={{fontSize:12,color:'var(--red)',marginBottom:8}}>Add Pexels API key in Settings to search images.</div>}
        <button className="btn bs bsm" onClick={searchImages} disabled={loadingImgs || !pexReady}>
          {loadingImgs ? <><span className="ring" style={{width:14,height:14,borderWidth:2}}/>Loading...</> : '🔍 Search Travel Photos'}
        </button>
        {imgError && <div style={{fontSize:12,color:'var(--red)',marginTop:6}}>{imgError}</div>}
        {images.length > 0 && (
          <div className="img-grid">
            {images.map(img => (
              <img key={img.id} src={img.src.medium} alt={img.alt}
                className={`img-thumb ${selectedImg?.id === img.id ? 'selected' : ''}`}
                onClick={() => setSelectedImg(img)} />
            ))}
          </div>
        )}
        {selectedImg && <div style={{fontSize:11,color:'var(--grn)',marginTop:4}}>✓ Photo selected — {selectedImg.photographer}</div>}
      </div>

      {/* Post buttons */}
      <div style={{fontSize:12,color:'var(--ts)',marginBottom:8}}>2. Post to platforms</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <button className="btn big2 bsm" onClick={postToInstagram} disabled={igPosting || !selectedImg}>
          {igPosting ? <><span className="ring" style={{width:14,height:14,borderWidth:2}}/>Posting...</> : '◎ Post to Instagram'}
        </button>
        <button className="btn bfb2 bsm" onClick={postToFacebook} disabled={fbPosting || !selectedImg}>
          {fbPosting ? <><span className="ring" style={{width:14,height:14,borderWidth:2}}/>Posting...</> : '⬡ Post to Facebook'}
        </button>
      </div>
      {statusEl(igStatus, igPosting)}
      {statusEl(fbStatus, fbPosting)}
      {!igReady && <div style={{fontSize:11,color:'var(--td)',marginTop:6}}>Instagram: add App ID, App Secret, Access Token, User ID in Settings.</div>}
      {!fbReady && <div style={{fontSize:11,color:'var(--td)',marginTop:4}}>Facebook: add Page ID and Page Access Token in Settings.</div>}
    </div>
  );
}

function QueuePage({ queue, published, approve, reject, editItem, platforms, pexelsKey }) {
  const [expanded, setExpanded] = useState(null);
  const [editing, setEditing] = useState(null);
  const [draft, setDraft] = useState({});
  const [activeTab, setActiveTab] = useState('script');
  const [filter, setFilter] = useState('pending');

  const pending = queue.filter(q => q.status === 'pending').length;
  const approved = published || [];

  // Combined list based on filter
  const filtered = filter === 'approved'
    ? approved
    : filter === 'all'
      ? [...queue, ...approved]
      : queue.filter(q => q.status === filter);

  const tabs = [{id:'script',l:'YT Script'},{id:'desc',l:'YT Desc'},{id:'ig',l:'Instagram'},{id:'tt',l:'TikTok'},{id:'fb',l:'Facebook'},{id:'broll',l:'B-Roll'},{id:'eng',l:'Engagement'}];

  const renderItem = (item) => (
    <div key={item.id} className="cc">
      <div className="cch">
        <div style={{flex:1}}>
          <div className="cct">{item.title}</div>
          <div className="ccm"><Plats /><span className={`stbd ${item.status === 'pending' ? 'spn' : item.status === 'approved' ? 'sap' : 'srj'}`}>{item.status}</span></div>
          <div style={{fontSize:12,color:'var(--td)',marginTop:6}}>{item.destination} · {new Date(item.createdAt).toLocaleDateString()}</div>
        </div>
        <button className="btn bg2b bsm" onClick={() => setExpanded(expanded === item.id ? null : item.id)}>{expanded === item.id ? 'Collapse ↑' : 'Expand ↓'}</button>
      </div>
      <div style={{marginBottom:14}}><div className="csl">Hook</div><div className="cst" style={{fontSize:13}}>{item.hook}</div></div>
      {expanded === item.id && (
        <div className="fi">
          {editing === item.id ? (
            <div>
              <div className="fg"><label className="lbl">Title</label><input className="inp" value={draft.title||''} onChange={e => setDraft(d => ({...d,title:e.target.value}))} /></div>
              <div className="fg"><label className="lbl">Hook</label><textarea className="inp" rows={3} value={draft.hook||''} onChange={e => setDraft(d => ({...d,hook:e.target.value}))} /></div>
              <div className="fg"><label className="lbl">YouTube Script</label><textarea className="inp" rows={10} value={draft.youtube_script||''} onChange={e => setDraft(d => ({...d,youtube_script:e.target.value}))} /></div>
              <div className="fg"><label className="lbl">Instagram Caption</label><textarea className="inp" rows={5} value={draft.instagram_caption||''} onChange={e => setDraft(d => ({...d,instagram_caption:e.target.value}))} /></div>
              <div className="fg"><label className="lbl">TikTok Caption</label><textarea className="inp" rows={3} value={draft.tiktok_caption||''} onChange={e => setDraft(d => ({...d,tiktok_caption:e.target.value}))} /></div>
              <div className="fg"><label className="lbl">Facebook Caption</label><textarea className="inp" rows={4} value={draft.facebook_caption||''} onChange={e => setDraft(d => ({...d,facebook_caption:e.target.value}))} /></div>
              <div className="ca">
                <button className="btn bp" onClick={() => { editItem(editing, draft); setEditing(null); setDraft({}); }}>Save Changes</button>
                <button className="btn bg2b" onClick={() => setEditing(null)}>Cancel</button>
              </div>
            </div>
          ) : (
            <div>
              <div className="tabs">{tabs.map(t => <button key={t.id} className={`tab ${activeTab === t.id ? 'active' : ''}`} onClick={() => setActiveTab(t.id)}>{t.l}</button>)}</div>
              {activeTab === 'script' && <div className="cst" style={{maxHeight:350,overflowY:'auto'}}>{item.youtube_script}</div>}
              {activeTab === 'desc' && <div className="cst" style={{maxHeight:350,overflowY:'auto'}}>{item.youtube_description}</div>}
              {activeTab === 'ig' && <div className="cst">{item.instagram_caption}</div>}
              {activeTab === 'tt' && <div className="cst">{item.tiktok_caption}</div>}
              {activeTab === 'fb' && <div className="cst">{item.facebook_caption}</div>}
              {activeTab === 'broll' && <div><div style={{marginBottom:14}}><div className="csl">B-Roll</div><div className="cst">{item.b_roll_suggestions?.map((s,i) => `${i+1}. ${s}`).join('\n')}</div></div><div><div className="csl">Thumbnail</div><div className="cst">{item.thumbnail_concept}</div></div></div>}
              {activeTab === 'eng' && <div><div style={{marginBottom:14}}><div className="csl">Pinned Comment</div><div className="cst">{item.pinned_comment}</div></div><div><div className="csl">Reply Templates</div><div className="cst">{item.comment_reply_templates?.map((t,i) => `Reply ${i+1}:\n${t}`).join('\n\n')}</div></div></div>}
            </div>
          )}
        </div>
      )}
      {/* Publish panel always visible for approved items */}
      {item.status === 'approved' && (
        <PublishPanel item={item} platforms={platforms} pexelsKey={pexelsKey} />
      )}
      {item.status === 'pending' && (
        <div className="ca">
          <button className="btn bsc" onClick={() => { approve(item.id); setExpanded(item.id); }}>✓ Approve & Publish</button>
          <button className="btn bs" onClick={() => { setEditing(item.id); setDraft({...item}); setExpanded(item.id); }}>✎ Edit</button>
          <button className="btn bd" onClick={() => reject(item.id)}>✕ Reject</button>
        </div>
      )}
      {item.status === 'rejected' && <div className="ca"><button className="btn bs" onClick={() => editItem(item.id, {status:'pending'})}>↩ Restore</button></div>}
    </div>
  );

  return (
    <div className="fi">
      <div className="ph"><h1>Approval Queue</h1><p>Review, approve, then post directly to Instagram &amp; Facebook.</p></div>
      {pending > 0 && <div className="ib" style={{marginBottom:24}}>✦ <strong>{pending} piece{pending > 1 ? 's' : ''}</strong> waiting for your approval. Approve → pick a photo → post instantly.</div>}
      <div style={{display:'flex',gap:8,marginBottom:24,flexWrap:'wrap'}}>
        {[
          {f:'pending', label:`Pending${pending > 0 ? ` (${pending})` : ''}`},

const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function CalendarPage({ published, queue }) {
  const [cur, setCur] = useState(new Date());
  const [sel, setSel] = useState(null);
  const yr = cur.getFullYear(), mo = cur.getMonth();
  const firstDay = new Date(yr, mo, 1).getDay();
  const dim = new Date(yr, mo + 1, 0).getDate();
  const all = [...published, ...queue.filter(q => q.status === 'pending')];
  const getDay = (d) => { const s = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; return all.filter(c => { const dt = c.approvedAt || c.createdAt; return dt && dt.startsWith(s); }); };
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= dim; d++) cells.push(d);
  const today = new Date();
  const selContent = sel ? getDay(sel) : [];

  return (
    <div className="fi">
      <div className="ph"><h1>Content Calendar</h1><p>Your approved content schedule.</p></div>
      <div className="g2" style={{gap:24,alignItems:'start'}}>
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <button className="btn bg2b bsm" onClick={() => setCur(new Date(yr, mo-1, 1))}>← Prev</button>
            <div style={{fontFamily:'Playfair Display,serif',fontSize:18,fontWeight:600}}>{MONTHS[mo]} {yr}</div>
            <button className="btn bg2b bsm" onClick={() => setCur(new Date(yr, mo+1, 1))}>Next →</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:8}}>
            {DAYS.map(d => <div key={d} style={{textAlign:'center',fontSize:11,color:'var(--td)',padding:'4px 0',textTransform:'uppercase'}}>{d}</div>)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
            {cells.map((day, i) => {
              if (!day) return <div key={i} />;
              const dc = getDay(day);
              const isToday = today.getDate() === day && today.getMonth() === mo && today.getFullYear() === yr;
              const isSel = sel === day;
              return (
                <div key={i} onClick={() => setSel(isSel ? null : day)} style={{padding:'8px 4px',borderRadius:8,textAlign:'center',cursor:'pointer',background:isSel?'var(--accd)':isToday?'var(--bgh)':'transparent',border:isSel?'1px solid var(--acc)':isToday?'1px solid var(--bdr)':'1px solid transparent',minHeight:52}}>
                  <div style={{fontSize:13,fontWeight:isToday?700:400,color:isToday?'var(--acc)':'var(--tp)',marginBottom:4}}>{day}</div>
                  {dc.length > 0 && <div style={{display:'flex',justifyContent:'center',gap:2}}>{dc.slice(0,3).map((_,ci) => <div key={ci} style={{width:6,height:6,borderRadius:'50%',background:'var(--acc)'}} />)}</div>}
                </div>
              );
            })}
          </div>
        </div>
        <div className="card">
          {sel ? (
            <>
              <div className="stl" style={{fontSize:16,marginBottom:16}}>{MONTHS[mo]} {sel}, {yr}</div>
              {selContent.length === 0 ? <div className="es" style={{padding:'32px 0'}}><div className="ei">◎</div><h3>No content</h3><p>Nothing scheduled for this day.</p></div> : selContent.map(item => (
                <div key={item.id} style={{padding:'12px 0',borderBottom:'1px solid var(--bds)'}}>
                  <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>{item.title}</div>
                  <div style={{fontSize:12,color:'var(--ts)',marginBottom:8}}>{item.destination}</div>
                  <Plats />
                </div>
              ))}
            </>
          ) : <div className="es" style={{padding:'40px 0'}}><div className="ei">▦</div><h3>Select a day</h3><p>Click any date to see content.</p></div>}
          <div className="dvd" />
          <div style={{fontSize:14,fontWeight:600,marginBottom:12,fontFamily:'Playfair Display,serif'}}>Month Summary</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span style={{color:'var(--ts)'}}>Total pieces</span><strong>{all.length}</strong></div>

}

      const query = selected.destination || 'travel';

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');

      <div style={{display:'flex',gap:8,marginBottom:8}}>
        {['1. Select Content','2. Get Footage','3. Get Voiceover'].map((s,i)=>(
          <div key={i} style={{flex:1,padding:'8px 12px',borderRadius:8,background:step>i?'var(--accd)':'var(--bgc)',border:`1px solid ${step>i?'var(--acc)':'var(--bds)'}`,fontSize:12,color:step>i?'var(--acc)':'var(--ts)',textAlign:'center'}}>{s}</div>
        ))}
      </div>
      <div className="dvd"/>
      <div className="card" style={{marginBottom:16}}>
        <div className="stl" style={{fontSize:16,marginBottom:12}}>Select Approved Content</div>
        {approved.length === 0 ? (
          <div className="es" style={{padding:'24px 0'}}><div className="ei">◎</div><h3>No approved content yet</h3><p>Approve content in the queue first.</p><button className="btn bp bsm" onClick={()=>setPage('queue')}>Go to Queue →</button></div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {approved.map(item=>(
              <div key={item.id} onClick={()=>{setSelectedId(item.id);setStep(1);setFootage([]);setVoiceReady(false);}} style={{padding:'12px 16px',borderRadius:8,cursor:'pointer',background:selectedId===item.id?'var(--accd)':'var(--bg)',border:`1px solid ${selectedId===item.id?'var(--acc)':'var(--bds)'}`,transition:'all .15s'}}>
                <div style={{fontWeight:600,fontSize:14}}>{item.title}</div>
                <div style={{fontSize:12,color:'var(--ts)',marginTop:2}}>{item.destination}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      {selected && (
        <>
          <div className="card" style={{marginBottom:16}}>
            <div className="stl" style={{fontSize:16,marginBottom:8}}>Step 2 — Get Stock Footage</div>
            <p style={{fontSize:13,color:'var(--ts)',marginBottom:16}}>Searches Pexels for travel footage matching <strong>{selected.destination}</strong>. Free, no watermarks.</p>
            <button className="btn bp" onClick={searchFootage} disabled={loadingFootage}>
              {loadingFootage?<><span className="ring"/> Searching...</>:'Search Travel Footage'}
            </button>
            {footage.length > 0 && (
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12,marginTop:16}}>
                {footage.map(v=>(
                  <div key={v.id} style={{borderRadius:8,overflow:'hidden',border:'1px solid var(--bds)'}}>
                    <video src={v.video_files?.[0]?.link} poster={v.image} style={{width:'100%',height:120,objectFit:'cover'}} muted controls/>
                    <div style={{padding:'8px 10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontSize:11,color:'var(--ts)'}}>{Math.round(v.duration)}s</span>
                      <a href={v.video_files?.[0]?.link} download className="btn bp bsm">Download</a>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div className="card" style={{marginBottom:16}}>
            <div className="stl" style={{fontSize:16,marginBottom:8}}>Step 3 — Generate Voiceover</div>
            <p style={{fontSize:13,color:'var(--ts)',marginBottom:16}}>Sends your script to ElevenLabs AI → downloads as MP3. Professional travel narrator voice.</p>
            <button className="btn bp" onClick={generateVoiceover} disabled={generatingVoice}>
              {generatingVoice?<><span className="ring"/> Generating voiceover...</>:'Generate & Download Voiceover'}
            </button>
            {voiceReady && <div style={{marginTop:16,padding:12,background:'var(--accd)',borderRadius:8,border:'1px solid var(--bdr)',fontSize:13,color:'var(--accl)'}}>✓ Voiceover downloaded! Now combine it with your footage in CapCut and upload to YouTube.</div>}
          </div>
          <div className="card">
            <div className="stl" style={{fontSize:16,marginBottom:8}}>Step 4 — Assemble & Upload</div>
            <div style={{display:'flex',flexDirection:'column',gap:8,fontSize:13,color:'var(--ts)'}}>
              <div style={{padding:'10px 12px',background:'var(--bg)',borderRadius:8,border:'1px solid var(--bds)'}}>1. Open <strong style={{color:'var(--tp)'}}>CapCut</strong> (free desktop app) → drag in your footage clips</div>
              <div style={{padding:'10px 12px',background:'var(--bg)',borderRadius:8,border:'1px solid var(--bds)'}}>2. Drag in your voiceover MP3 as the audio track</div>
              <div style={{padding:'10px 12px',background:'var(--bg)',borderRadius:8,border:'1px solid var(--bds)'}}>3. Export as MP4 → upload to YouTube with the pre-written title, description & tags</div>
              <div style={{padding:'10px 12px',background:'var(--accd)',borderRadius:8,border:'1px solid var(--bdr)',color:'var(--accl)'}}>⚡ Once your server is ready, this step becomes fully automatic.</div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
